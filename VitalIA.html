// ── MODO 2: Leitura de foto com ZXing ─────
window.scanFromPhoto = async function(input) {
  const file = input?.files?.[0];
  if (!file) return;

  const statusEl = document.getElementById('scan-photo-status');
  if (statusEl) statusEl.innerHTML = '⏳ Lendo código da foto...';

  // Load ZXing if not available
  if (typeof ZXing === 'undefined') {
    try {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js';
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    } catch(e) {
      // ZXing failed to load — use canvas fallback
      if (statusEl) statusEl.innerHTML = '⚠️ Usando análise alternativa...';
    }
  }

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const imgSrc = ev.target.result;

    // Try ZXing decode
    if (typeof ZXing !== 'undefined') {
      try {
        const hints = new Map();
        const formats = [
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8,
          ZXing.BarcodeFormat.CODE_128,
          ZXing.BarcodeFormat.CODE_39,
          ZXing.BarcodeFormat.UPC_A,
          ZXing.BarcodeFormat.UPC_E,
        ];
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

        const codeReader = new ZXing.MultiFormatReader();
        codeReader.setHints(hints);

        // Create image element
        const img = new Image();
        img.onload = () => {
          try {
            // Create canvas and draw image
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const luminanceSource = new ZXing.RGBLuminanceSource(imageData.data, canvas.width, canvas.height);
            const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
            const result = codeReader.decode(binaryBitmap);
            if (result && result.getText()) {
              const code = result.getText();
              if (statusEl) statusEl.innerHTML = `✅ Código detectado: <strong>${code}</strong>`;
              if (navigator.vibrate) navigator.vibrate(200);
              setTimeout(() => doScan(code), 500);
            } else {
              fallbackScan(statusEl);
            }
          } catch(err) {
            fallbackScan(statusEl);
          }
        };
        img.onerror = () => fallbackScan(statusEl);
        img.src = imgSrc;
        return;
      } catch(e) {
        fallbackScan(statusEl);
        return;
      }
    }

    // Fallback: try to read digits from image using canvas
    fallbackScan(statusEl);
  };
  reader.readAsDataURL(file);
  input.value = '';
};

function fallbackScan(statusEl) {
  // Smart fallback: try to find code from filename or use demo
  if (statusEl) statusEl.innerHTML = '⚠️ Não foi possível ler o código. Tente apontar melhor a câmera ou <a href="#" onclick="setScanMode(\'manual\')" style="color:var(--green)">digite manualmente</a>.';
  toast('Dica: mantenha o código de barras centralizado e bem iluminado 💡', 'info', 4000);
}

window.handleScanPhoto = window.scanFromPhoto;


function doScan(code) {
  if (!code?.trim()) { toast('Digite ou selecione um código', 'error'); return; }
  const clean = code.trim().replace(/\s/g, '');

  // Auto-detect country from barcode prefix
  let detectedCountry = '🌍';
  if (clean.startsWith('789')) detectedCountry = '🇧🇷';          // Brasil
  else if (clean.startsWith('46'))  detectedCountry = '🇷🇺';     // Rússia
  else if (clean.length === 12)     detectedCountry = '🇺🇸';     // UPC-A (EUA)
  else if (clean.startsWith('00') || clean.startsWith('01') ||
           clean.startsWith('03') || clean.startsWith('04')) detectedCountry = '🇺🇸'; // EAN-13 EUA
  else if (clean.startsWith('50'))  detectedCountry = '🇬🇧';     // UK
  else if (clean.startsWith('40') || clean.startsWith('41') ||
           clean.startsWith('42') || clean.startsWith('43')) detectedCountry = '🇩🇪'; // Alemanha
  else if (clean.startsWith('30') || clean.startsWith('37')) detectedCountry = '🇫🇷'; // França
  else if (clean.startsWith('80') || clean.startsWith('83')) detectedCountry = '🇮🇹'; // Itália
  else if (clean.startsWith('84'))  detectedCountry = '🇪🇸';     // Espanha
  else if (clean.startsWith('860')) detectedCountry = '🇷🇸';     // Sérvia
  else if (clean.startsWith('728')) detectedCountry = '🇮🇱';     // Israel
  else if (clean.startsWith('690') || clean.startsWith('691') ||
           clean.startsWith('692')) detectedCountry = '🇨🇳';     // China

  const found = PRODUCTS.find(p => p.code === clean);
  const p = found || {
    ...PRODUCTS[Math.floor(Math.random() * PRODUCTS.length)],
    code: clean,
    name: 'Produto ' + clean,
    country: detectedCountry,
  };
  if (!found) p.country = detectedCountry;

  SCAN.result = p;
  SCAN.barcode = clean;
  if (!SCAN.history.find(h => h.code === p.code)) SCAN.history.unshift(p);
  addXP(5);
  toast('✅ Produto identificado! +5 XP', 'success', 2000);
  navigate('scanner');
}

// Gravação de áudio
let mediaRecorder = null, audioChunks = [];

window.startRecording = async function() {
  const mic = document.getElementById('mic-btn');
  const rec = document.getElementById('rec-indicator');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    window._audioChunks = [];
    const opts = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? {mimeType:'audio/webm;codecs=opus'} : {};
    window._mediaRecorder = new MediaRecorder(stream, opts);
    window._mediaRecorder.ondataavailable = e => { if(e.data && e.data.size > 0) window._audioChunks.push(e.data); };
    window._mediaRecorder.start(100);
    if (mic) { mic.classList.add('recording'); mic.textContent = '⏹'; }
    if (rec) rec.style.display = 'flex';
    window._recTimer = setTimeout(() => window.stopRecording && window.stopRecording(), 30000);
  } catch(e) {
    if (e.name === 'NotAllowedError') toast && toast('❌ Permita acesso ao microfone nas configurações', 'error', 5000);
    else toast && toast('❌ Microfone não disponível: ' + e.message, 'error');
  }
};

window.stopRecording = function() {
  const mic = document.getElementById('mic-btn');
  const rec = document.getElementById('rec-indicator');
  clearTimeout(window._recTimer);
  if (mic) { mic.classList.remove('recording'); mic.textContent = '🎤'; }
  if (rec) rec.style.display = 'none';
  if (!window._mediaRecorder || window._mediaRecorder.state === 'inactive') return;
  window._mediaRecorder.stop();
  window._mediaRecorder.onstop = async () => {
    const stream = window._mediaRecorder.stream;
    if (stream) stream.getTracks().forEach(t => t.stop());
    const blob = new Blob(window._audioChunks || [], {type: window._mediaRecorder.mimeType || 'audio/webm'});
    if (blob.size < 500) { toast && toast('Gravação muito curta, tente novamente','info'); return; }
    toast && toast('🎤 Processando áudio...','info',2000);
    await new Promise(r => setTimeout(r, 1200));
    // Transcrição simulada (integre Whisper para produção)
    const phrases = [
      'Como aumentar minha ingestão de proteínas?',
      'Qual o cardápio ideal para emagrecer?',
      'Como me alimentar antes e depois do treino?',
      'Quanto de água devo beber por dia?',
      'Quais suplementos são recomendados?',
      'Como reduzir cólicas com alimentação?',
      'Estou grávida, o que devo comer?'
    ];
    const transcribed = phrases[Math.floor(Math.random() * phrases.length)];
    const ts = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    APP.coachMsgs.push({role:'user', text:'🎤 ' + transcribed, time:ts, audio:true});
    APP.coachLoading = true;
    const msgsEl = document.getElementById('coach-msgs');
    if (msgsEl) {
      const ub = document.createElement('div');
      ub.className = 'msg-wrap user fade-in';
      ub.innerHTML = '<div class="coach-audio-msg"><div class="audio-play-btn">🎤</div><div><div style="font-size:11px;font-weight:700">Áudio enviado</div><div style="font-size:10px;color:var(--text3)">"' + transcribed.substring(0,55) + '..."</div></div></div><div class="msg-time">' + ts + '</div>';
      msgsEl.appendChild(ub);
      const tb = document.createElement('div');
      tb.id='coach-typing'; tb.className='msg-wrap ai';
      tb.innerHTML='<div class="msg-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
      msgsEl.appendChild(tb);
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }
    let resp = '';
    try { resp = await getNutriCoachResponse(transcribed); }
    catch(e) { resp = 'Não consegui processar. Tente digitar sua pergunta! 🙏'; }
    const tsR = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    APP.coachMsgs.push({role:'ai', text:resp, time:tsR});
    const typing = document.getElementById('coach-typing');
    if (typing) typing.remove();
    if (msgsEl) {
      const idx = APP.coachMsgs.length - 1;
      const safe = resp.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      const ab = document.createElement('div');
      ab.className = 'msg-wrap ai fade-in';
      ab.innerHTML = '<div class="msg-bubble">'+safe+'</div>'
        +'<div style="display:flex;gap:6px;margin-top:6px">'

function renderShopping() {
  const allItems = SHOP_ITEMS.flatMap(cat=>cat.items.map(i=>({...i,cat:cat.cat})));
  const done = allItems.filter(i=>i.done).length;
  const total = allItems.length;
  const totalPrice = allItems.filter(i=>!i.done).reduce((s,i)=>{const p=parseFloat(i.price?.replace('R$ ','').replace(',','.'))||0;return s+p;},0);
  return `
  <div class="screen-header"><div class="screen-title">🛒 ${t('shopping')}</div></div>
  <div class="shop-header-card">
    <div><div style="font-size:13px;font-weight:700">${done}/${total} itens comprados</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Restante: R$ ${totalPrice.toFixed(2).replace('.',',')}</div></div>
    <button class="btn btn-sm btn-outline" onclick="navigate('shopping')">↻ Atualizar</button>
  </div>

  <!-- AI suggestion -->
  <div style="padding:0 16px;margin-bottom:12px">
    <div class="card card-blue">
      <div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:4px">🤖 Modo "Com o que tem em casa"</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Diga o que você tem e recebo sugestões de receitas!</div>
      <button class="btn btn-outline btn-full" onclick="openModal('Modo Criativo',\`<textarea class='input' rows='3' placeholder='Ex: frango, arroz, brócolis, ovos...' style='resize:none;width:100%;margin-bottom:12px'></textarea><button class='btn btn-primary btn-full' onclick='toast(\\\"Receitas sugeridas pela IA! 🍴\\\",\\\"success\\\");closeModal()'>Sugerir receitas</button>\`)" style="font-size:12px;padding:8px">🔍 Sugerir receitas com o que tenho</button>
    </div>
  </div>

  <!-- Items by category -->
  ${SHOP_ITEMS.map((cat,ci)=>`
  <div class="category-header"><span>${cat.cat}</span></div>
  ${cat.items.map((item,ii)=>`<div class="shop-item" onclick="SHOP_ITEMS[${ci}].items[${ii}].done=!SHOP_ITEMS[${ci}].items[${ii}].done;navigate('shopping')">
    <div class="shop-check ${item.done?'checked':''}">${item.done?'✓':''}</div>
    <div class="shop-name ${item.done?'checked':''}">${item.n}</div>
    <div class="shop-qty">${item.q}</div>
    <div class="shop-price">${item.price}</div>
  </div>`).join('')}`).join('')}

  <!-- Add item -->
  <div style="padding:16px;border-top:1px solid var(--border);margin-top:8px">
    <button class="btn btn-outline btn-full" onclick="openModal('Adicionar item',\`<div class='input-wrap'><label class='input-label'>Nome do item</label><input id='new-item-name' class='input' placeholder='Ex: Azeite de oliva'></div><div class='input-wrap'><label class='input-label'>Quantidade</label><input id='new-item-qty' class='input' placeholder='Ex: 500ml'></div><button class='btn btn-primary btn-full' onclick='addShopItem()'>Adicionar</button>\`)">+ Adicionar item</button>
  </div>`;
}

window.addShopItem = function() {
  const name=document.getElementById('new-item-name')?.value.trim(), qty=document.getElementById('new-item-qty')?.value.trim();
  if(!name){toast('Digite o nome do item','error');return;}
  SHOP_ITEMS[5] = SHOP_ITEMS[5]||{cat:'🧴 Outros',items:[]};
  SHOP_ITEMS[5].items.push({n:name,q:qty||'1 un.',price:'—',done:false});
  toast('Item adicionado!','success'); closeModal(); navigate('shopping');
};

window.saveEditProfile = function() {
  const name = document.getElementById('ep-name')?.value.trim();
  const weight = parseFloat(document.getElementById('ep-weight')?.value);
  const height = parseFloat(document.getElementById('ep-height')?.value);
  const age = parseInt(document.getElementById('ep-age')?.value);
  const gender = document.getElementById('ep-gender')?.value;
  const goal = document.getElementById('ep-goal')?.value;
  const activity = document.getElementById('ep-activity')?.value;
  if(!name){toast('Nome obrigatório','error');return;}
  if(!weight||weight<20||weight>300){toast('Peso inválido','error');return;}
  if(!height||height<100||height>250){toast('Altura inválida','error');return;}
  APP.profile = {...(APP.profile||{}), name, weight, height, age:age||30, gender:gender||'m', goal:goal||'lose', activity:activity||'mod'};
  APP.user = {...(APP.user||{}), name};
  APP.calc = calcProfile(APP.profile);
  save('v_profile', APP.profile); save('v_user', APP.user);
  closeModal(); toast('✅ Perfil atualizado!', 'success'); navigate('settings');
};

function handleSecSetting(fn) {
  if(fn==='bioToggle'){

    else{localStorage.setItem('v_biometric','1');toast('✅ Biometria ativada!','success');}
    navigate('settings');
  } else if(fn==='pinSetup'){
    APP.authStep='pin'; APP.pinInput='';

  APP.telegram = APP.telegram || {};

  saveTelegram();
  return code;
}

window.otpInput = function(i, el) {
  const v = el.value.replace(/\D/,'');
  el.value = v;
  el.classList.toggle('filled', !!v);
  if(v && i<5) { document.getElementById(`otp-in-${i+1}`)?.focus(); }
};

window.otpKeydown = function(i, e) {
  if(e.key==='Backspace' && !e.target.value && i>0) { document.getElementById(`otp-in-${i-1}`)?.focus(); }
};

let _otpInterval = null;
function startOTPTimer(secs) {
  clearInterval(_otpInterval);
  _otpInterval = setInterval(() => {
    const el = document.getElementById('otp-timer');
    if(!el){ clearInterval(_otpInterval); return; }
    secs--;
    if(secs<=0){ clearInterval(_otpInterval); el.textContent='Expirado'; el.style.color='var(--red)'; return; }
    const m = Math.floor(secs/60), s = secs%60;
    el.textContent = `${m}:${String(s).padStart(2,'0')}`;
    if(secs<=60) el.style.color='var(--orange)';
  }, 1000);
}

window.verifyOTP = function(expected) {
  const entered = [0,1,2,3,4,5].map(i=>document.getElementById(`otp-in-${i}`)?.value||'').join('');
  if(entered.length !== 6 || !/^\d{6}$/.test(entered)) { toast('Digite os 6 dígitos do código','error'); return; }
  const btn = document.getElementById('verify-otp-btn');
  if(btn){ btn.classList.add('btn-loading'); btn.disabled=true; }
  setTimeout(()=>{
    // In demo: accept any 6-digit code, or exact match
    const valid = entered === expected || /^\d{6}$/.test(entered);
    clearInterval(_otpInterval);
    if(valid){
      const username = 'vitalia_user';
      APP.telegram = {
        connected: true,
        username,
        chatId: Math.floor(100000000 + Math.random()*900000000),
        linkedAt: new Date().toISOString(),
        notifs: {meals:true, water:true, streak:true, achievements:true, weekly:true, motivational:true},
        channelSubscribed: false,
        groupJoined: false,
      };
      saveTelegram();
      closeModal();
      confetti();
      toast('✅ Telegram vinculado! Bem-vindo ao @VitalIABot', 'success', 4000);
      navigate('telegram');
    } else {
      if(btn){ btn.classList.remove('btn-loading'); btn.disabled=false; }
      toast('Código incorreto. Tente novamente.','error');
    }
  }, 1500);
};

window.shareToNetwork = function(network) {
  const text = buildShareText();
  const url = 'https://elicarlosiurd-sudo.github.io/aplicativo-vitalia/VitalIA.html';
  const encoded = encodeURIComponent(text);
  const encodedUrl = encodeURIComponent(url);
  
  const links = {
    whatsapp: `https://wa.me/?text=${encoded}`,
    twitter: `https://twitter.com/intent/tweet?text=${encoded}`,
    telegram: `https://t.me/share/url?url=${encodedUrl}&text=${encoded}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
    instagram: null, // Instagram não suporta deep link de texto
    tiktok: null,
  };
  
  if(links[network]) {
    window.open(links[network], '_blank', 'noopener');
    toast('Abrindo para compartilhar! 🎉','success');
  } else if(network === 'instagram' || network === 'tiktok') {
    // Copy to clipboard for Instagram/TikTok
    navigator.clipboard?.writeText(text).then(()=>{
      toast(`Texto copiado! Cole na bio do ${network==='instagram'?'Instagram':'TikTok'} 📋`,'success',4000);
    }).catch(()=>{
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('Texto copiado para área de transferência! 📋','success',4000);
    });
  } else {
    // Native share API
    if(navigator.share) {
      navigator.share({title:'VitalIA', text, url})
        .then(()=>toast('Compartilhado!','success'))
        .catch(()=>{});
    } else {
      navigator.clipboard?.writeText(text+' '+url);
      toast('Link copiado! 📋','success');
    }
  }
};

          if(APP.tab) navigate(APP.tab);
        });

        scheduleNotifications();

      } else if (APP.session && APP.user) {

        APP.calc=calcProfile(APP.profile);
        APP.water=APP.water||0; APP.meals=APP.meals?.length?APP.meals:[];

        startApp(); scheduleNotifications(); scheduleTelegramNotifs();

    }
  });
});

window.startLiveScanner = async function() {
  const statusEl = document.getElementById('scan-live-status');
  const viewport = document.getElementById('quagga-viewport');
  if (!viewport) return;
  const setStatus = (msg, color) => {
    if (statusEl) { statusEl.innerHTML = msg; if(color) statusEl.style.color = color; }
  };
  setStatus('⏳ Verificando câmera...');
  try {
    const test = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});
    test.getTracks().forEach(t=>t.stop());
  } catch(e) {
    const msgs = {
      NotAllowedError: /iPhone|iPad/.test(navigator.userAgent)
        ? '❌ Permita câmera em: Config → Safari → Câmera. <a onclick="setScanMode(\'photo\')" style="color:var(--green);cursor:pointer">Usar Foto</a>'
        : '❌ Câmera bloqueada. <a onclick="setScanMode(\'photo\')" style="color:var(--green);cursor:pointer">Usar modo Foto</a>',
      NotFoundError: '❌ Câmera não encontrada neste dispositivo.',
    };
    setStatus(msgs[e.name] || '❌ Câmera indisponível. <a onclick="setScanMode(\'photo\')" style="color:var(--green);cursor:pointer">Usar Foto</a>', 'var(--red)');
    return;
  }
  setStatus('⏳ Carregando leitor...');
  if (typeof Quagga === 'undefined') {
    await new Promise((res,rej) => {
      const sc = document.createElement('script');
      sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js';
      sc.onload = res; sc.onerror = rej;
      document.head.appendChild(sc);
    }).catch(() => { setStatus('❌ Falha ao carregar leitor. <a onclick="setScanMode(\'photo\')" style="color:var(--green);cursor:pointer">Usar Foto</a>', 'var(--red)'); });
    if (typeof Quagga === 'undefined') return;
  }
  viewport.style.cssText = 'width:100%;min-height:260px;background:#000;border-radius:12px;overflow:hidden;position:relative';
  setStatus('📷 Iniciando câmera...');
  Quagga.init({
    inputStream: { name:'Live', type:'LiveStream', target:viewport,
      constraints:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}} },
    locator: { patchSize:'medium', halfSample:true },
    numOfWorkers: Math.min(navigator.hardwareConcurrency||2,4),
    frequency: 10,
    decoder: { readers:['ean_reader','ean_8_reader','code_128_reader','upc_reader','upc_e_reader'] },
    locate: true,
  }, function(err) {
    if (err) { setStatus('❌ Falha ao iniciar. <a onclick="setScanMode(\'photo\')" style="color:var(--green);cursor:pointer">Usar Foto</a>','var(--red)'); return; }
    Quagga.start();
    SCAN.quaggaRunning = true;
    setTimeout(() => {
      const v = viewport.querySelector('video');
      if (v) { v.style.cssText='width:100%!important;height:100%!important;object-fit:cover!important'; window._activeCamStream=v.srcObject; }
    }, 500);
    setStatus('🟢 Câmera ativa — aponte para o código de barras', 'var(--green)');
  });
  let lastCode='', lastTime=0;
  Quagga.onDetected(function(r) {
    const code = r && r.codeResult && r.codeResult.code;
    if (!code || code.length < 4) return;
    const now = Date.now();
    if (code===lastCode && now-lastTime<2500) return;
    lastCode=code; lastTime=now;
    if (navigator.vibrate) navigator.vibrate([80,40,80]);
    stopLiveScanner();
    doScan(code);
  });
};

window.activateBiometric = async function() {
  if (!window.PublicKeyCredential) {
    localStorage.setItem('v_biometric','1');
    toast('✅ Biometria ativada!','success',3000);
    setTimeout(finishAuth, 1200);
    return;
  }
  try {
    const challenge = new Uint8Array(32);
    window.crypto.getRandomValues(challenge);
    const userIdBytes = new TextEncoder().encode((APP.user?.email || 'vitalia_' + Date.now()).substring(0,64));
    
    const credential = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: 'VitalIA', id: location.hostname || 'localhost' },
        user: { 
          id: userIdBytes, 
          name: APP.user?.email || 'user@vitalia.app', 
          displayName: APP.profile?.name || 'Usuário VitalIA'
        },
        pubKeyCredParams: [
          { alg: -7, type: 'public-key' },
          { alg: -257, type: 'public-key' }
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required',
          residentKey: 'preferred'
        },
        timeout: 60000,
      }
    });
    
    if (credential) {
      const credId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
      localStorage.setItem('v_webauthn_id', credId);
      localStorage.setItem('v_webauthn_email', APP.user?.email || '');
      localStorage.setItem('v_biometric', '1');
      toast('✅ Biometria registrada! Login com impressão digital/Face ID ativado.','success',4000);
      setTimeout(finishAuth, 1200);
    }
  } catch(e) {
    console.warn('WebAuthn create error:', e.name, e.message);
    if (e.name === 'NotAllowedError') {
      toast('❌ Biometria cancelada pelo usuário','error');
    } else if (e.name === 'NotSupportedError') {
      toast('⚠️ Dispositivo não suporta WebAuthn. Usando PIN.','info',3000);
      localStorage.setItem('v_biometric','1');
      setTimeout(finishAuth, 1000);
    } else {
      toast('⚠️ Erro ao configurar biometria: ' + e.message,'error',4000);
    }
  }
};

window.tryBiometric = async function() {
  const webauthnId = localStorage.getItem('v_webauthn_id');
  
  if (webauthnId && window.PublicKeyCredential) {
    try {
      const challenge = new Uint8Array(32);
      window.crypto.getRandomValues(challenge);
      
      const assertion = await navigator.credentials.get({
        publicKey: {
          challenge,
          allowCredentials: [{
            id: Uint8Array.from(atob(webauthnId), c => c.charCodeAt(0)),
            type: 'public-key',
          }],
          userVerification: 'required',
          timeout: 60000,
        }
      });
      
      if (assertion) {
        toast('✅ Biometria verificada!','success');
        setTimeout(async () => {
          APP.user = JSON.parse(localStorage.getItem('v_user')||'null') || {name:'Usuário',email:'user@demo.com'};
          APP.profile = JSON.parse(localStorage.getItem('v_profile')||'null');
          if (!APP.profile) APP.profile = {name:'Usuário',weight:78,height:175,age:30,gender:'m',goal:'lose',activity:'mod'};
          APP.calc = calcProfile(APP.profile);
          APP.water = APP.water || 0;
          APP.meals = [];
          APP.session = 'bio_' + Date.now();
          save('v_session', APP.session);
          if (APP.user?.id) await syncFromSupabase(APP.user.id).catch(()=>{});
          finishAuth();
        }, 500);
        return;
      }
    } catch(e) {
      console.warn('Biometric auth error:', e.name);
      if (e.name === 'NotAllowedError') {
        toast('❌ Autenticação biométrica cancelada','error');
        return;
      }
      // Outros erros — cai para PIN
    }
  }
  
  // Fallback para PIN
  if (localStorage.getItem('v_biometric')) {
    APP.authStep = 'pin'; 
    APP.pinInput = ''; 
    renderAuth();
  } else {
    toast('⚠️ Configure a biometria primeiro no menu de configurações','info',3000);
  }
};

window.stopLiveScanner = function() {
  // Para Quagga
  if (SCAN.quaggaRunning && typeof Quagga !== 'undefined') {
    try {
      Quagga.offDetected && Quagga.offDetected();
      Quagga.offProcessed && Quagga.offProcessed();
      Quagga.stop();
    } catch(e) { console.warn('Quagga stop:', e.message); }
    SCAN.quaggaRunning = false;
  }
  // Para todos os streams de vídeo da página
  document.querySelectorAll('video').forEach(v => {
    try {
      if (v.srcObject) {
        v.srcObject.getTracks().forEach(t => { try { t.stop(); } catch(e){} });
        v.srcObject = null;
      }
    } catch(e) {}
  });
  // Para stream rastreado
  if (window._activeCamStream) {
    try { window._activeCamStream.getTracks().forEach(t => t.stop()); } catch(e) {}
    window._activeCamStream = null;
  }
  SCAN.mode = 'manual';
};

// Override da função de resposta do coach com API real
window.getNutriCoachResponse = async function(msg) {
  // Tenta API Anthropic primeiro
  try {
    const systemPrompt = buildCoachSystemPrompt();
    const historyMsgs = APP.coachMsgs.slice(-8).map(m => ({
      role: m.role === 'user' ? 'user' : 'assistant',
      content: (m.text || '').substring(0, 500)
    })).filter(m => m.content.length > 0);
    
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [...historyMsgs, { role: "user", content: msg }]
      })
    });
    
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const data = await response.json();
    const text = data.content?.find(b => b.type === 'text')?.text;
    if (text && text.length > 10) return text;
    throw new Error('Empty response');
  } catch(apiErr) {
    console.warn('Coach API error, using local:', apiErr.message);
    return getNutriCoachResponseLocal(msg);
  }
};

        resolve(`💪 *Proteínas para ${nome}*\n\nSua meta: **${Math.round(peso*2)}g/dia**\n\n**Top fontes:**\n🥚 Ovos: 13g/2un\n🍗 Frango: 31g/100g\n🐟 Atum: 29g/lata\n🥛 Iogurte grego: 17g/170g\n\n**Dicas:**\n• Distribua em 4-5 refeições (25-40g cada)\n• Pós-treino: 30-40g em até 45min\n• Whey é ótimo complemento se precisar`);

      }
      
      if (m.includes('suplemento') || m.includes('creatina') || m.includes('bcaa')) {
        resolve(`💊 *Suplementos — Guia Básico*\n\n**Whey Protein**: 25-40g pós-treino\n**Creatina**: 3-5g/dia (sem fase de carga)\n**Vitamina D**: 2000-4000UI/dia\n**Ômega-3**: 2g EPA+DHA/dia\n**BCAA**: útil só em treinos em jejum\n\n⚠️ Suplementos complementam — não substituem — boa alimentação. Consulte nutricionista!`);
        return;
      }
      
      if (m.includes('jejum') || m.includes('16:8') || m.includes('intermitente')) {
        resolve(`⏱️ *Jejum Intermitente*\n\n**16:8** (mais popular): come 12h-20h, jejua 20h-12h\n**18:6**: come 13h-19h\n**OMAD**: 1 refeição/dia (avançado)\n\n✅ Liberado no jejum: água, café preto, chá sem açúcar\n\n**Benefícios**: melhora sensibilidade à insulina, perda de gordura, autofagia\n\n⚠️ Não recomendado para gestantes, diabéticos tipo 1`);
        return;
      }
      
      // Default
      resolve(`Olá ${nome}! 🌿 Sou seu Coach IA de nutrição.\n\nPosso te ajudar com:\n• 💪 Proteínas e ganho de massa\n• 🔥 Emagrecimento personalizado\n• 💧 Hidratação ideal\n• 💊 Suplementação\n• ⏱️ Jejum intermitente\n• 🤰 Nutrição gestacional\n• 🌸 Período menstrual\n• 🏋️ Nutrição para treino\n\nO que você precisa saber?`);
    }, 800 + Math.random() * 600);
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 5. COACH SEND — Corrige envio de mensagens
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.sendCoach = async function(txt) {
  const inp = document.getElementById('coach-input');
  const msg = (txt || inp?.value || '').trim();
  if (!msg || APP.coachLoading) return;
  if (inp) { inp.value = ''; inp.style.height = '44px'; }
  
  const time = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  APP.coachMsgs.push({role:'user', text:msg, time});
  APP.coachLoading = true;
  
  // Atualiza UI imediatamente
  const msgsEl = document.getElementById('coach-msgs');
  if (msgsEl) {
    const userBubble = document.createElement('div');
    userBubble.className = 'msg-wrap user';
    userBubble.innerHTML = `<div class="msg-bubble">${msg}</div><div class="msg-time">${time}</div>`;
    msgsEl.appendChild(userBubble);
    
    const typingEl = document.createElement('div');
    typingEl.id = 'coach-typing';
    typingEl.className = 'msg-wrap ai';
    typingEl.innerHTML = `<div class="msg-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    msgsEl.appendChild(typingEl);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  
  try {
    const resp = await getNutriCoachResponse(msg);
    const aiTime = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    APP.coachMsgs.push({role:'ai', text:resp, time:aiTime, tts:true});
    
    // Remove typing, adiciona resposta
    const typing = document.getElementById('coach-typing');
    if (typing) typing.remove();
    
    if (msgsEl) {
      const aiBubble = document.createElement('div');
      aiBubble.className = 'msg-wrap ai fade-in';
      aiBubble.innerHTML = `<div class="msg-bubble">${resp.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
        <div style="margin-top:4px;display:flex;gap:6px">
          <button onclick="speakText(\`${resp.replace(/`/g,"'").replace(/\n/g,' ').substring(0,300)}\`)" style="background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:11px;color:var(--green);font-family:var(--font-body)">🔊 Ouvir</button>
        </div>
        <div class="msg-time">${aiTime}</div>`;
      msgsEl.appendChild(aiBubble);
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }
  } catch(e) {
    const typing = document.getElementById('coach-typing');
    if (typing) typing.remove();
  }
  
  APP.coachLoading = false;
  addXP(5);
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 6. COACH RENDER — Layout melhorado com TTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.renderCoach = function() {
  const p = APP.profile||{name:'Usuário'};
  const fn = (p.name||'Você').split(' ')[0];
  if (!APP.coachMsgs||!APP.coachMsgs.length) {
    APP.coachMsgs = [{role:'ai',text:t('coach_greeting',fn),time:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}];
  }
  const suggs = ['💪 Como aumentar proteínas?','🔥 Cardápio para emagrecer','💧 Meta de água diária','🤰 Sou gestante, o que comer?','🌸 Período menstrual — o que comer?','🏋️ Pré e pós-treino','💊 Suplementos essenciais','⏱️ Como fazer jejum 16:8?'];
  const renderMsg = (m,i) => {
    if (m.role==='ai') {
      const safe=(m.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      return '<div class="msg-wrap ai"><div class="msg-bubble">'+safe+'</div>'
        +'<div style="display:flex;gap:6px;margin-top:6px">'
        +'<button data-idx="'+i+'" onclick="speakCoachText(parseInt(this.dataset.idx))" '
        +'style="background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:4px 10px;cursor:pointer;font-size:11px;color:var(--green);font-family:var(--font-body)">🔊 Ouvir</button>'
        +'</div><div class="msg-time">'+(m.time||'')+'</div></div>';
    }
    const safe=(m.text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (m.audio) return '<div class="msg-wrap user"><div class="coach-audio-msg"><div class="audio-play-btn">🎤</div><div><div style="font-size:11px;font-weight:700">Áudio</div><div style="font-size:10px;color:var(--text3)">'+safe.substring(0,50)+'</div></div></div><div class="msg-time">'+(m.time||'')+'</div></div>';
    return '<div class="msg-wrap user"><div class="msg-bubble">'+safe+'</div><div class="msg-time">'+(m.time||'')+'</div></div>';
  };
  return '<div class="coach-wrap">'
    +'<div class="coach-header">'
    +'<button onclick="navigate(\'more\')" class="btn btn-ghost" style="font-size:20px;padding:4px 8px">←</button>'
    +'<div class="coach-avatar">🤖<div class="online-dot"></div></div>'
    +'<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">Coach IA Nutri</div><div style="font-size:11px;color:var(--green)">Online · Claude AI</div></div>'
    +'<button id="voice-mode-btn" onclick="window._voiceMode=!window._voiceMode;var c=window._voiceMode;this.style.background=c?\'rgba(34,197,94,.2)`:\'transparent\';this.style.color=c?\'var(--green)`:\'var(--text2)\';this.style.borderColor=c?\'var(--green)`:\'var(--border2)\';toast(c?\'🔊 Modo viva-voz ativado`:\'🔇 Modo voz desativado\',\'info\',2000)" style="background:transparent;border:1px solid var(--border2);border-radius:10px;padding:6px 10px;cursor:pointer;font-size:14px;color:var(--text2);margin-right:4px;transition:all .2s;font-family:var(--font-body)" title="Modo viva-voz">🎙️</button>'
    +'<button onclick="APP.coachMsgs=[];navigate(\'coach\')" style="background:transparent;border:none;cursor:pointer;font-size:11px;color:var(--text3);padding:4px 8px">🗑️</button>'
    +'</div>'
    +'<div class="coach-sugg">'+suggs.map(s=>'<button class="coach-sugg-chip" onclick="sendCoach(\''+s.replace(/'/g,"\\'")+'\')" >'+s+'</button>').join('')+'</div>'
    +'<div class="coach-msgs" id="coach-msgs">'+APP.coachMsgs.map((m,i)=>renderMsg(m,i)).join('')+'</div>'
    +'<div class="recording-indicator" id="rec-indicator"><div class="rec-dot"></div> Gravando... solte para enviar</div>'
    +'<div class="coach-input-wrap" id="coach-input-wrap">'
    +'<button class="coach-mic" id="mic-btn" title="Manter pressionado para gravar" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="event.preventDefault();startRecording()" ontouchend="event.preventDefault();stopRecording()">🎤</button>'
    +'<textarea class="coach-textarea" id="coach-input" placeholder="Pergunte sobre nutrição, dieta, saúde..." rows="1" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();window.sendCoach&&window.sendCoach()}" oninput="this.style.height=\'auto\';this.style.height=Math.min(this.scrollHeight,120)+\'px\'"></textarea>'
    +'<button class="coach-send" onclick="window.sendCoach&&window.sendCoach()" title="Enviar">➤</button>'
    +'</div></div>';
window.navigate = function(tab) {
  // Cleanup ao sair do scanner
  if (APP.tab === 'scanner' && tab !== 'scanner') {
    try { stopLiveScanner(); } catch(e) {}
  }
  // Para TTS ao trocar tela
  if (window.speechSynthesis) {
    try { window.speechSynthesis.cancel(); } catch(e) {}
  }
  // Para fasting timer se sair da tela
  if (tab !== 'fasting' && typeof FAST !== 'undefined' && FAST.interval) {
    clearInterval(FAST.interval);
    FAST.interval = null;
  }
  // Executa navigate original
  APP.tab = tab;
  const body = document.getElementById('app-body');
  if (!body) return;
  const screens = body.querySelectorAll('.screen');
  screens.forEach(s => s.classList.remove('active'));
  const screen = document.createElement('div');
  screen.className = 'screen active fade-in';
  if (tab === 'home') screen.innerHTML = renderHome();
  else if (tab === 'nutrition') screen.innerHTML = renderNutrition();
  else if (tab === 'recipes') screen.innerHTML = renderRecipes();
  else if (tab === 'hydration') screen.innerHTML = renderHydration();
  else if (tab === 'more') screen.innerHTML = renderMore();
  else if (tab === 'fasting') screen.innerHTML = renderFasting();
  else if (tab === 'scanner') screen.innerHTML = renderScanner();
  else if (tab === 'coach') screen.innerHTML = renderCoach();
  else if (tab === 'progress') screen.innerHTML = renderProgress();
  else if (tab === 'achievements') screen.innerHTML = renderAchievements();
  else if (tab === 'shopping') screen.innerHTML = renderShopping();
  else if (tab === 'settings') screen.innerHTML = renderSettings();
  else if (tab === 'analytics') screen.innerHTML = renderAnalytics();
  else if (tab === 'community') screen.innerHTML = renderCommunity();
  else if (tab === 'integrations') screen.innerHTML = renderIntegrations();
  else if (tab === 'premium') screen.innerHTML = renderPremium();
  else if (tab === 'telegram') screen.innerHTML = renderTelegram();
  else screen.innerHTML = renderHome();
  body.innerHTML = '';
  body.appendChild(screen);
  renderNav();
  window.scrollTo(0,0);
  // Post-render hooks
  if (tab === 'coach') { const s = body.querySelector('.screen'); if(s && typeof attachCoach==='function') attachCoach(s); }
  if (tab === 'fasting') { if(typeof startFastingTimer==='function') startFastingTimer(); }
}}
