<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>VitalIA – Saúde com Inteligência</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   CSS VARIABLES & RESET
═══════════════════════════════════════ */
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#1e2530; --surface3:#242c38;
  --green:#22c55e; --green2:#16a34a; --orange:#f97316; --blue:#38bdf8;
  --purple:#a78bfa; --red:#f87171; --yellow:#fbbf24; --pink:#f472b6;
  --text:#f0f6fc; --text2:#8b949e; --text3:#484f58;
  --border:#21262d; --border2:#30363d;
  --gradient:linear-gradient(135deg,#22c55e,#16a34a);
  --gradient2:linear-gradient(135deg,#38bdf8,#a78bfa);
  --shadow:0 8px 32px rgba(0,0,0,.5);
  --radius:16px; --radius-sm:10px; --radius-lg:24px;
  --font-body:'Sora',sans-serif; --font-serif:'Lora',serif;
  --nav-h:68px; --header-h:60px;
  --transition:.2s ease;
}
.light-mode {
  --bg:#f8fafc; --surface:#ffffff; --surface2:#f1f5f9; --surface3:#e2e8f0;
  --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --border:#e2e8f0; --border2:#cbd5e1;
  --shadow:0 4px 20px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
img{max-width:100%;display:block}
button{font-family:var(--font-body);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font-body);outline:none}
a{text-decoration:none;color:inherit}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
#root{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;max-width:430px;margin:0 auto;background:var(--bg)}
#app-body{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 12px)}
.screen.no-nav{padding-bottom:0}
.screen.active{z-index:10}

/* ═══════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════ */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInFast{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes ringFill{from{stroke-dashoffset:var(--ring-full)}to{stroke-dashoffset:var(--ring-offset)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes confettiDrop{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.fade-in{animation:fadeIn .35s ease forwards}
.fade-in-fast{animation:fadeInFast .2s ease forwards}
.pop-in{animation:pop .3s ease forwards}

/* ═══════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════ */
#bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:var(--nav-h);
  background:rgba(22,27,34,.95);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);z-index:100;
  display:flex;align-items:center;justify-content:space-around;
  padding:0 4px env(safe-area-inset-bottom,0);
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 0;cursor:pointer;transition:all var(--transition);position:relative;border:none;background:transparent}
.nav-icon{font-size:20px;transition:transform .2s}
.nav-label{font-size:9.5px;font-weight:600;color:var(--text3);transition:color .2s;letter-spacing:.2px}
.nav-item.active .nav-label{color:var(--green)}
.nav-item.active .nav-icon{transform:scale(1.15)}
.nav-item:last-child .nav-icon{color:var(--green);font-size:22px;font-weight:900;letter-spacing:-1px}
.nav-item::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--green);border-radius:0 0 4px 4px;transition:width .25s}
.nav-item.active::before{width:32px}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.screen-header{position:sticky;top:0;z-index:50;background:rgba(13,17,23,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.screen-title{font-family:var(--font-serif);font-size:20px;font-weight:700}
.light-mode .screen-header{background:rgba(248,250,252,.92)}

/* ═══════════════════════════════════════
   CARDS & SURFACES
═══════════════════════════════════════ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-glow{background:linear-gradient(135deg,rgba(34,197,94,.08),var(--surface));border-color:rgba(34,197,94,.2)}
.card-blue{background:linear-gradient(135deg,rgba(56,189,248,.08),var(--surface));border-color:rgba(56,189,248,.2)}
.card-purple{background:linear-gradient(135deg,rgba(167,139,250,.08),var(--surface));border-color:rgba(167,139,250,.2)}
.card-orange{background:linear-gradient(135deg,rgba(249,115,22,.08),var(--surface));border-color:rgba(249,115,22,.2)}
.card.clickable{cursor:pointer;transition:all var(--transition)}
.card.clickable:active{transform:scale(.98);border-color:var(--green)}
.section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;padding:0 16px;margin:20px 0 10px}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;transition:all var(--transition);cursor:pointer;border:none;white-space:nowrap}
.btn-primary{background:var(--gradient);color:#000;font-weight:700;box-shadow:0 4px 20px rgba(34,197,94,.3)}
.btn-primary:active{transform:scale(.97);box-shadow:0 2px 10px rgba(34,197,94,.2)}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text)}
.btn-outline:active{border-color:var(--green);color:var(--green)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-full{width:100%;border-radius:var(--radius)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px}
.btn-icon{width:40px;height:40px;border-radius:12px;padding:0;background:var(--surface2);border:1px solid var(--border)}
.btn-loading{position:relative;color:transparent!important}
.btn-loading::after{content:'';position:absolute;width:18px;height:18px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;color:#000}

/* ═══════════════════════════════════════
   INPUTS
═══════════════════════════════════════ */
.input-wrap{margin-bottom:14px}
.input-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;font-size:14px;color:var(--text);transition:border-color var(--transition)}
.input:focus{border-color:var(--green);background:var(--surface)}
.input::placeholder{color:var(--text3)}
.input.error{border-color:var(--red)}
.input-error{font-size:11px;color:var(--red);margin-top:4px}
.input-icon{position:relative}
.input-icon .input{padding-left:42px}
.input-icon .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ═══════════════════════════════════════
   PILLS & BADGES
═══════════════════════════════════════ */
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700}
.pill-green{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.pill-orange{background:rgba(249,115,22,.12);color:var(--orange);border:1px solid rgba(249,115,22,.2)}
.pill-blue{background:rgba(56,189,248,.12);color:var(--blue);border:1px solid rgba(56,189,248,.2)}
.pill-purple{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.pill-red{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.pill-yellow{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.2)}
.badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:99px;font-size:10px;font-weight:800;background:var(--red);color:#fff;position:absolute;top:-4px;right:-4px}

/* ═══════════════════════════════════════
   PROGRESS RINGS
═══════════════════════════════════════ */
.ring-container{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-text{position:absolute;text-align:center}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
.tab-row{display:flex;gap:6px;padding:0 16px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 14px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;transition:all var(--transition);cursor:pointer;flex-shrink:0}
.tab-btn.active{background:rgba(34,197,94,.12);border-color:var(--green);color:var(--green)}

/* ═══════════════════════════════════════
   TOGGLE SWITCH
═══════════════════════════════════════ */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--surface3);border-radius:99px;cursor:pointer;transition:.3s}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle input:checked+.toggle-slider{background:var(--green)}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px)}

/* ═══════════════════════════════════════
   SKELETON LOADING
═══════════════════════════════════════ */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}

/* ═══════════════════════════════════════
   BOTTOM SHEET MODAL
═══════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex;animation:fadeInFast .2s}
.bottom-sheet{width:100%;max-width:430px;margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);max-height:92vh;overflow-y:auto;animation:slideUp .3s ease}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:12px auto 0}
.sheet-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sheet-title{font-family:var(--font-serif);font-size:17px;font-weight:700}
.sheet-body{padding:16px 20px}
.sheet-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:16px;color:var(--text2)}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;width:90%;max-width:360px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;font-size:13px;font-weight:500;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;animation:slideDown .3s ease;pointer-events:all}
.toast-success{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08)}
.toast-error{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08)}
.toast-info{border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.08)}

/* ═══════════════════════════════════════
   SPLASH SCREEN
═══════════════════════════════════════ */
#splash{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:fadeInFast .3s}
.splash-logo{font-size:64px;animation:pulse 1.5s ease-in-out infinite}
.splash-name{font-family:var(--font-serif);font-size:36px;font-weight:700;color:var(--green);font-style:italic}
.splash-tag{font-size:13px;color:var(--text3)}
.splash-dots{display:flex;gap:6px;margin-top:8px}
.splash-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:bounce .9s infinite}
.splash-dot:nth-child(2){animation-delay:.15s}
.splash-dot:nth-child(3){animation-delay:.3s}

/* ═══════════════════════════════════════
   AUTH SCREENS
═══════════════════════════════════════ */
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:none;flex-direction:column;overflow-y:auto}
#auth-screen.active{display:flex}
.auth-bg{background:radial-gradient(ellipse at top,rgba(34,197,94,.15) 0%,transparent 60%),var(--bg);min-height:100dvh;padding:40px 20px 32px;display:flex;flex-direction:column}
.auth-logo-wrap{text-align:center;margin-bottom:32px}
.auth-logo{font-size:48px;margin-bottom:8px}
.auth-logo-name{font-family:var(--font-serif);font-size:28px;font-weight:700;color:var(--green);font-style:italic}
.auth-card{background:rgba(22,27,34,.9);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;backdrop-filter:blur(20px)}
.auth-title{font-family:var(--font-serif);font-size:22px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.social-btn{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:14px;font-weight:500;width:100%;margin-bottom:10px;transition:all var(--transition)}
.social-btn:active{border-color:var(--green)}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:12px;color:var(--text3)}
.auth-link{color:var(--green);font-weight:600;cursor:pointer}
.auth-link:hover{text-decoration:underline}
.step-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:24px}
.step-dot{width:28px;height:4px;border-radius:99px;background:var(--border2);transition:background .3s}
.step-dot.active{background:var(--green)}
.step-dot.done{background:var(--green2)}
.biometric-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--radius);border:2px dashed var(--border2);background:transparent;cursor:pointer;width:100%;font-size:14px;font-weight:600;color:var(--text2);transition:all var(--transition)}
.biometric-btn:active{border-color:var(--green);color:var(--green)}

/* ═══════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════ */
.home-hero{padding:20px 16px;background:radial-gradient(ellipse at top right,rgba(34,197,94,.12),transparent 60%)}
.greeting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.greeting-name{font-family:var(--font-serif);font-size:22px;font-weight:700;font-style:italic}
.greeting-sub{font-size:12px;color:var(--text2);margin-top:2px}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(34,197,94,.3);flex-shrink:0}
.score-section{display:flex;gap:16px;align-items:center;margin-bottom:16px}
.score-ring-wrap{flex-shrink:0}
.score-info{flex:1}
.score-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.score-value{font-family:var(--font-serif);font-size:40px;font-weight:700;line-height:1;color:var(--green)}
.score-desc{font-size:12px;color:var(--text2);margin-top:4px}
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.macro-card{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center;border:1px solid var(--border)}
.macro-val{font-family:var(--font-serif);font-size:18px;font-weight:700}
.macro-label{font-size:10px;color:var(--text2);margin-top:2px}
.macro-bar{height:3px;border-radius:99px;background:var(--border);margin-top:6px;overflow:hidden}
.macro-fill{height:100%;border-radius:99px;transition:width .8s}
.calory-ring-wrap{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px}
.calory-info{flex:1}
.calory-label{font-size:11px;color:var(--text3)}
.calory-main{font-family:var(--font-serif);font-size:24px;font-weight:700;color:var(--orange)}
.calory-sub{font-size:11px;color:var(--text2);margin-top:2px}
.emoji-check{display:flex;gap:8px;flex-wrap:wrap}
.emoji-btn{width:48px;height:48px;border-radius:14px;border:2px solid var(--border);background:var(--surface2);font-size:22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.emoji-btn.selected{border-color:var(--green);background:rgba(34,197,94,.1);transform:scale(1.08)}
.next-action-card{background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(56,189,248,.08));border:1px solid rgba(34,197,94,.25);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all var(--transition)}
.next-action-card:active{transform:scale(.99)}
.next-action-icon{font-size:32px;flex-shrink:0}
.next-action-title{font-size:13px;font-weight:700;margin-bottom:2px}
.next-action-sub{font-size:11px;color:var(--text2)}
.streak-card{background:linear-gradient(135deg,rgba(249,115,22,.2),rgba(251,191,36,.1));border:1px solid rgba(249,115,22,.3);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;margin:0 16px 12px}
.streak-num{font-family:var(--font-serif);font-size:38px;font-weight:700;color:var(--orange);line-height:1}
.streak-info .t{font-size:14px;font-weight:700;color:var(--orange)}
.streak-info .s{font-size:12px;color:var(--text2);margin-top:2px}
.quick-btn{background:var(--surface);border:2px solid rgba(34,197,94,.4);border-radius:var(--radius-sm);padding:12px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all var(--transition);font-size:13px;font-weight:700;flex:1;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.quick-btn:active{background:rgba(34,197,94,.12);border-color:var(--green);color:var(--green);transform:scale(.97)}
.quick-btn .qb-icon{font-size:22px;flex-shrink:0}
.quick-btn .qb-label{font-size:12px;font-weight:700;line-height:1.3}
.water-mini{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.water-cup{font-size:18px;transition:all .2s}
.water-cup.filled{opacity:1}
.water-cup.empty{opacity:.25}

/* ═══════════════════════════════════════
   NUTRITION / DIARY SCREEN
═══════════════════════════════════════ */
.camera-area{background:var(--surface2);border:2px dashed var(--border2);border-radius:var(--radius-lg);margin:0 16px;padding:40px 20px;text-align:center;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.camera-area:active{border-color:var(--green);background:rgba(34,197,94,.05)}
.camera-area input{position:fixed;left:-9999px;opacity:0;width:1px;height:1px}
.camera-icon{font-size:48px;margin-bottom:12px}
.camera-title{font-size:15px;font-weight:700;margin-bottom:4px}
.camera-sub{font-size:12px;color:var(--text2)}
.preview-img{width:100%;border-radius:var(--radius);margin-bottom:12px;object-fit:cover;max-height:240px}
.analysis-card{border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 12px;background:var(--surface)}
.analysis-title{font-family:var(--font-serif);font-size:16px;font-weight:700;margin-bottom:4px}
.analysis-score{display:flex;align-items:center;gap:8px;margin:10px 0}
.score-badge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0}
.nutrient-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.nutrient-cell{background:var(--surface2);border-radius:8px;padding:8px;text-align:center}
.nutrient-val{font-size:13px;font-weight:700}
.nutrient-label{font-size:9px;color:var(--text3);margin-top:1px}
.meal-entry{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.meal-time{width:42px;font-size:11px;color:var(--text3);text-align:right;flex-shrink:0;font-weight:600}
.meal-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;position:relative}
.meal-dot::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:1px;height:calc(100% + 24px);background:var(--border)}
.meal-info{flex:1}
.meal-name{font-size:13px;font-weight:600}
.meal-cal{font-size:11px;color:var(--text2);margin-top:2px}
.meal-emoji{font-size:28px;flex-shrink:0}

/* ═══════════════════════════════════════
   RECIPES SCREEN
═══════════════════════════════════════ */
.recipe-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:all var(--transition)}
.recipe-card:active{transform:scale(.99);border-color:var(--green)}
.recipe-hero{height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:64px;position:relative}
.recipe-hero-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:8px 12px}
.recipe-tags{display:flex;gap:4px;flex-wrap:wrap}
.recipe-body{padding:12px 14px}
.recipe-name{font-size:14px;font-weight:700;margin-bottom:4px}
.recipe-meta{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--text2)}
.recipe-meta span{display:flex;align-items:center;gap:3px}
.recipe-detail{padding:16px}
.ingredient-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.ingredient-bullet{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.step-item{display:flex;gap:12px;margin-bottom:16px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--green);color:#000;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:2px}
.step-text{font-size:13px;line-height:1.65;flex:1}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px;margin-bottom:12px}
.filter-chip{padding:6px 12px;border-radius:99px;font-size:11px;font-weight:600;border:1.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all var(--transition)}
.filter-chip.active{background:rgba(34,197,94,.12);border-color:var(--green);color:var(--green)}
.stars{display:flex;gap:2px}
.star{font-size:14px;color:var(--border2)}
.star.filled{color:var(--yellow)}

/* ═══════════════════════════════════════
   HYDRATION SCREEN
═══════════════════════════════════════ */
.water-hero{text-align:center;padding:24px 16px;position:relative}
.water-big-num{font-family:var(--font-serif);font-size:60px;font-weight:700;color:var(--blue);line-height:1}
.water-unit{font-size:16px;color:var(--text2)}
.water-progress-wrap{width:200px;margin:0 auto 20px;position:relative}
.water-buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px;margin-bottom:16px}
.water-add-btn{background:rgba(56,189,248,.1);border:1.5px solid rgba(56,189,248,.3);color:var(--blue);border-radius:var(--radius);padding:16px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.water-add-btn:active{background:rgba(56,189,248,.2);transform:scale(.97)}
.water-cups{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px;justify-content:center;margin-bottom:16px}
.water-cup-icon{font-size:28px;opacity:.3;cursor:pointer;transition:all .2s}
.water-cup-icon.filled{opacity:1}
.water-tip{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.15);border-radius:var(--radius);padding:14px 16px;margin:0 16px}
.water-tip-text{font-size:12px;color:var(--text2);line-height:1.6}
.water-history{padding:0 16px}
.history-bar-row{display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:6px}
.history-bar{flex:1;background:rgba(56,189,248,.2);border-radius:4px 4px 0 0;min-height:4px;transition:height .5s;position:relative;cursor:pointer}
.history-bar:hover{background:rgba(56,189,248,.4)}
.history-labels{display:flex;gap:6px}
.history-label{flex:1;text-align:center;font-size:9px;color:var(--text3)}

/* ═══════════════════════════════════════
   FASTING SCREEN
═══════════════════════════════════════ */
.fast-hero{text-align:center;padding:24px 16px}
.fast-ring-wrap{margin:0 auto 20px;width:220px;height:220px;position:relative;display:flex;align-items:center;justify-content:center}
.fast-ring-text{position:absolute;text-align:center}
.fast-time{font-family:var(--font-serif);font-size:38px;font-weight:700;line-height:1}
.fast-status{font-size:11px;color:var(--text3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.fast-status.active{color:var(--purple)}
.protocol-card{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:var(--radius);border:1.5px solid var(--border2);cursor:pointer;margin-bottom:10px;transition:all var(--transition)}
.protocol-card.active{border-color:var(--purple);background:rgba(167,139,250,.08)}
.protocol-name{font-size:14px;font-weight:700}
.protocol-desc{font-size:11px;color:var(--text2);margin-top:2px}

/* ═══════════════════════════════════════
   SCANNER SCREEN
═══════════════════════════════════════ */
.scanner-area{background:var(--surface2);border-radius:var(--radius-lg);margin:0 16px;padding:40px 20px;text-align:center;cursor:pointer;position:relative;border:2px dashed var(--border2)}
.scanner-frame{width:200px;height:160px;border:3px solid var(--green);border-radius:12px;margin:0 auto 16px;position:relative;display:flex;align-items:center;justify-content:center}
.scanner-line{position:absolute;width:90%;height:2px;background:var(--green);box-shadow:0 0 8px var(--green);animation:scanLine 2s ease-in-out infinite}
@keyframes scanLine{0%,100%{top:15%}50%{top:80%}}
.scanner-corner{position:absolute;width:20px;height:20px;border-color:var(--green);border-style:solid}
.sc-tl{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.sc-tr{top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.sc-bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.sc-br{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.product-card{border-radius:var(--radius);padding:16px;margin:0 16px 12px}
.product-semaphore{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.product-name{font-size:16px;font-weight:700;margin-bottom:4px}
.product-brand{font-size:12px;color:var(--text2)}
.nutrient-table{width:100%;border-collapse:collapse;margin-top:12px}
.nutrient-table th,.nutrient-table td{padding:8px 10px;font-size:12px;border-bottom:1px solid var(--border);text-align:left}
.nutrient-table th{color:var(--text3);font-weight:600}
.alert-item{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:12px}

/* ═══════════════════════════════════════
   COACH SCREEN
═══════════════════════════════════════ */
.coach-wrap{position:absolute;inset:0;display:flex;flex-direction:column}
.coach-header{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:12px;background:var(--surface)}
.coach-avatar{width:40px;height:40px;border-radius:50%;background:var(--gradient2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--surface)}
.coach-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.msg-wrap{display:flex;flex-direction:column;gap:4px;max-width:85%}
.msg-wrap.user{align-self:flex-end;align-items:flex-end}
.msg-wrap.ai{align-self:flex-start}
.msg-bubble{padding:11px 14px;border-radius:16px;font-size:13px;line-height:1.6;word-break:break-word}
.msg-wrap.user .msg-bubble{background:var(--green);color:#000;border-bottom-right-radius:4px;font-weight:500}
.msg-wrap.ai .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--text3);padding:0 4px}
.typing-dots{display:flex;gap:4px;padding:4px 2px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);animation:bounce .9s infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
.coach-input-wrap{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;align-items:flex-end;background:var(--surface)}
.coach-textarea{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;padding:11px 14px;font-size:14px;color:var(--text);resize:none;min-height:44px;max-height:100px;overflow-y:auto}
.coach-textarea:focus{border-color:var(--green);background:var(--surface)}
.coach-send{width:44px;height:44px;border-radius:14px;background:var(--gradient);border:none;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;transition:all .2s;color:#000}
.coach-send:active{transform:scale(.93)}
.coach-mic{width:44px;height:44px;border-radius:14px;background:var(--surface2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;transition:all .2s;color:var(--text2)}
.coach-mic.recording{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red);animation:micPulse 1s ease-in-out infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}
.coach-audio-msg{display:flex;align-items:center;gap:8px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);border-radius:12px;padding:8px 12px;font-size:12px;color:var(--blue)}
.audio-play-btn{width:32px;height:32px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
.recording-indicator{display:none;align-items:center;gap:8px;padding:8px 12px;background:rgba(248,113,113,.1);border-top:1px solid rgba(248,113,113,.2);font-size:12px;color:var(--red);font-weight:700}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:recBlink .8s ease-in-out infinite}
@keyframes recBlink{0%,100%{opacity:1}50%{opacity:.2}}
.coach-sugg{display:flex;gap:6px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none;flex-shrink:0}
.coach-sugg::-webkit-scrollbar{display:none}
.coach-sugg-chip{padding:7px 13px;border-radius:99px;border:1px solid var(--border2);background:var(--surface2);font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s;flex-shrink:0;color:var(--text2)}
.coach-sugg-chip:active{border-color:var(--green);color:var(--green)}

/* ═══════════════════════════════════════
   PROGRESS SCREEN
═══════════════════════════════════════ */
.weight-chart{height:120px;position:relative;margin:0 16px 4px;background:var(--surface2);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.weight-chart svg{position:absolute;inset:0}
.stat-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:12px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-val{font-family:var(--font-serif);font-size:24px;font-weight:700}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.progress-bar{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:99px;background:var(--gradient);transition:width .8s}

/* ═══════════════════════════════════════
   ACHIEVEMENTS
═══════════════════════════════════════ */
.xp-header{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(249,115,22,.08));border:1px solid rgba(251,191,36,.2);border-radius:var(--radius);padding:16px;margin:0 16px 12px;display:flex;align-items:center;gap:14px}
.xp-num{font-family:var(--font-serif);font-size:32px;font-weight:700;color:var(--yellow)}
.xp-level{font-size:12px;font-weight:700;color:var(--orange)}
.xp-bar-wrap{flex:1}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px}
.badge-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;transition:all var(--transition)}
.badge-icon{font-size:36px;margin-bottom:6px}
.badge-name{font-size:11px;font-weight:700;margin-bottom:2px}
.badge-desc{font-size:9px;color:var(--text3)}
.badge-item.locked{opacity:.45;filter:grayscale(.8)}
.badge-item.unlocked{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.04)}
.challenge-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:0 16px 10px;cursor:pointer;transition:all var(--transition)}
.challenge-card:active{border-color:var(--green)}
.challenge-title{font-size:13px;font-weight:700;margin-bottom:4px}
.challenge-meta{font-size:11px;color:var(--text2);display:flex;gap:10px}
.challenge-progress-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:10px}
.challenge-fill{height:100%;border-radius:99px;background:var(--gradient)}

/* ═══════════════════════════════════════
   SHOPPING LIST
═══════════════════════════════════════ */
.shop-header-card{background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(56,189,248,.06));border:1px solid rgba(34,197,94,.2);border-radius:var(--radius);padding:14px 16px;margin:0 16px 12px;display:flex;justify-content:space-between;align-items:center}
.shop-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s}
.shop-item:active{background:var(--surface2)}
.shop-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.shop-check.checked{background:var(--green);border-color:var(--green)}
.shop-name{flex:1;font-size:13px;font-weight:500}
.shop-name.checked{text-decoration:line-through;color:var(--text3)}
.shop-qty{font-size:11px;color:var(--text2)}
.shop-price{font-size:11px;color:var(--text3)}
.category-header{display:flex;align-items:center;gap:8px;padding:12px 16px 6px;font-size:12px;font-weight:700;color:var(--text2)}

/* ═══════════════════════════════════════
   SETTINGS SCREEN
═══════════════════════════════════════ */
.profile-hero{padding:24px 16px;text-align:center}
.profile-avatar-big{width:80px;height:80px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;border:3px solid rgba(34,197,94,.3);position:relative;cursor:pointer}
.profile-name{font-family:var(--font-serif);font-size:20px;font-weight:700;font-style:italic;margin-bottom:2px}
.profile-email{font-size:12px;color:var(--text2)}
.settings-group{margin-bottom:8px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin:0 16px 10px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;gap:10px}
.settings-row:last-child{border-bottom:none}
.settings-row:active{background:var(--surface2)}
.settings-icon{font-size:18px;width:24px;flex-shrink:0}
.settings-text{flex:1}
.settings-label{font-size:14px;font-weight:500}
.settings-sub{font-size:11px;color:var(--text3);margin-top:1px}
.settings-arrow{color:var(--text3);font-size:16px}
.lang-options{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:16px}
.lang-option{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);border:2px solid var(--border2);background:var(--surface2);cursor:pointer;transition:all .2s}
.lang-option.active{border-color:var(--green);background:rgba(34,197,94,.08)}
.lang-flag{font-size:22px}
.lang-name{font-size:13px;font-weight:600}
.premium-card{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(249,115,22,.1));border:1px solid rgba(251,191,36,.3);border-radius:var(--radius);padding:16px;margin:0 16px 12px}
.premium-title{font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--yellow);margin-bottom:4px}
.plan-compare{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:16px}
.plan-col{border-radius:var(--radius);padding:14px;border:1.5px solid var(--border2)}
.plan-col.featured{border-color:var(--green);background:rgba(34,197,94,.06);position:relative}
.plan-name{font-size:12px;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.plan-price{font-family:var(--font-serif);font-size:22px;font-weight:700;margin-bottom:8px}
.plan-feat{font-size:10px;color:var(--text2);display:flex;gap:4px;margin-bottom:4px;align-items:flex-start}

/* ═══════════════════════════════════════
   SOCIAL SHARE CARD
═══════════════════════════════════════ */
.share-card{background:linear-gradient(135deg,#0d1f0f,#0a1628);border:1px solid rgba(34,197,94,.3);border-radius:var(--radius-lg);padding:24px;margin:0 16px;text-align:center}
.share-weight-lost{font-family:var(--font-serif);font-size:48px;font-weight:700;color:var(--green);font-style:italic}
.share-actions{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.share-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;border:none}

/* ═══════════════════════════════════════
   PAYWALL
═══════════════════════════════════════ */
.paywall-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end}
.paywall-sheet{width:100%;max-width:430px;margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px env(safe-area-inset-bottom,24px)}
.paywall-emoji{font-size:48px;text-align:center;margin-bottom:12px}
.paywall-title{font-family:var(--font-serif);font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.paywall-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px}
.paywall-feature{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px}

/* ═══════════════════════════════════════
   CONFETTI
═══════════════════════════════════════ */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:confettiDrop 2.5s ease forwards;pointer-events:none;z-index:9999}

/* ═══════════════════════════════════════
   TELEGRAM STYLES
═══════════════════════════════════════ */
.tg-login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 16px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,#229ED9,#1a8bbf);color:#fff;font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:10px;box-shadow:0 4px 16px rgba(34,158,217,.3)}
.tg-login-btn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(34,158,217,.2)}
.tg-login-btn .tg-plane{font-size:20px;animation:tgFloat 2s ease-in-out infinite}
@keyframes tgFloat{0%,100%{transform:translateY(0) rotate(-10deg)}50%{transform:translateY(-3px) rotate(10deg)}}
.tg-connected-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;background:rgba(34,158,217,.12);border:1px solid rgba(34,158,217,.3);font-size:12px;font-weight:700;color:#229ED9}
.tg-card{background:linear-gradient(135deg,rgba(34,158,217,.12),rgba(34,158,217,.04));border:1px solid rgba(34,158,217,.25);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.tg-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tg-icon{font-size:24px;width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#229ED9,#1a8bbf);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:22px}
.tg-title{font-size:15px;font-weight:700;color:#229ED9}
.tg-sub{font-size:11px;color:var(--text2);margin-top:2px}
.otp-wrap{display:flex;gap:8px;justify-content:center;margin:16px 0}
.otp-digit{width:44px;height:52px;border-radius:12px;border:2px solid var(--border2);background:var(--surface2);font-size:22px;font-weight:800;text-align:center;color:var(--text);font-family:var(--font-body);transition:all .2s}
.otp-digit:focus{border-color:#229ED9;background:var(--surface);outline:none;box-shadow:0 0 0 3px rgba(34,158,217,.15)}
.otp-digit.filled{border-color:#229ED9;background:rgba(34,158,217,.06)}
.tg-message-preview{background:var(--surface2);border-radius:var(--radius);padding:14px;font-size:12px;line-height:1.7;border-left:3px solid #229ED9;margin-bottom:10px;font-family:'Courier New',monospace}
.tg-message-preview strong{color:var(--text);font-weight:700}
.tg-message-preview em{color:#229ED9;font-style:italic}
.tg-btn-inline{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;background:rgba(34,158,217,.15);border:1px solid rgba(34,158,217,.25);font-size:11px;font-weight:600;color:#229ED9;cursor:pointer;transition:all .2s}
.tg-btn-inline:active{background:rgba(34,158,217,.3)}
.tg-cmd-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.tg-cmd-code{font-family:'Courier New',monospace;font-size:12px;font-weight:700;color:#229ED9;background:rgba(34,158,217,.08);padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.tg-cmd-desc{font-size:12px;color:var(--text2);margin-top:2px}
.tg-notif-row{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .2s}
.tg-notif-row:active{border-color:#229ED9;background:rgba(34,158,217,.05)}
.tg-notif-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.tg-notif-info{flex:1}
.tg-notif-label{font-size:13px;font-weight:600}
.tg-notif-sub{font-size:11px;color:var(--text2);margin-top:2px}
.tg-qr-area{width:120px;height:120px;border-radius:12px;background:var(--surface2);border:1px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;font-size:10px;color:var(--text3);gap:4px}
.tg-step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.tg-step-num{width:26px;height:26px;border-radius:50%;background:#229ED9;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.tg-step-text{font-size:12px;color:var(--text2);line-height:1.6}
@keyframes otpPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,158,217,.4)}50%{box-shadow:0 0 0 6px rgba(34,158,217,0)}}
.otp-active{animation:otpPulse 1.5s ease-in-out infinite}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ═══════════════════════════════════════
   SUPABASE — CONFIG E AUTH REAL
═══════════════════════════════════════ */
const SUPABASE_URL = 'https://qyerrlteeoiudtgmguzk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5ZXJybHRlZW9pdWR0Z21ndXprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjM4MzgsImV4cCI6MjA4OTU5OTgzOH0.DZiOp28edRnu8EL-MOvDilG2DlON8W_OAL2gm4gwVIw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Auth helpers ──────────────────────
async function sbSignUp(email, password, nome) {
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { nome } }
  });
  return { data, error };
}

async function sbSignIn(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  return { data, error };
}

async function sbSignOut() {
  await sb.auth.signOut();
}

async function sbGetUser() {
  const { data: { user } } = await sb.auth.getUser();
  return user;
}

// ── Perfil ────────────────────────────
async function sbGetPerfil(userId) {
  const { data } = await sb.from('perfis').select('*').eq('id', userId).single();
  return data;
}

async function sbSavePerfil(userId, perfil) {
  const { error } = await sb.from('perfis').upsert({ id: userId, ...perfil, atualizado_em: new Date().toISOString() });
  return !error;
}

// ── Refeições ─────────────────────────
async function sbGetRefeicoes(userId) {
  const hoje = new Date().toISOString().split('T')[0];
  const { data } = await sb.from('refeicoes').select('*').eq('user_id', userId).eq('data', hoje).order('hora');
  return data || [];
}

async function sbAddRefeicao(userId, refeicao) {
  const hoje = new Date().toISOString().split('T')[0];
  const { error } = await sb.from('refeicoes').insert({ user_id: userId, data: hoje, ...refeicao });
  return !error;
}

// ── Hidratação ────────────────────────
async function sbGetAgua(userId) {
  const hoje = new Date().toISOString().split('T')[0];
  const { data } = await sb.from('hidratacao').select('*').eq('user_id', userId).eq('data', hoje).single();
  return data?.copos || 0;
}

async function sbSaveAgua(userId, copos) {
  const hoje = new Date().toISOString().split('T')[0];
  await sb.from('hidratacao').upsert({
    user_id: userId, data: hoje, copos,
    ml: copos * 250, atualizado_em: new Date().toISOString()
  }, { onConflict: 'user_id,data' });
}

// ── Peso ──────────────────────────────
async function sbGetPesos(userId) {
  const { data } = await sb.from('peso_historico').select('*').eq('user_id', userId).order('data', { ascending: false }).limit(30);
  return (data || []).map(r => ({ date: new Date(r.data).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}), peso: r.peso })).reverse();
}

async function sbAddPeso(userId, peso) {
  const hoje = new Date().toISOString().split('T')[0];
  const { error } = await sb.from('peso_historico').insert({ user_id: userId, peso, data: hoje });
  return !error;
}

// ── Gamificação ───────────────────────
async function sbGetGamificacao(userId) {
  const { data } = await sb.from('gamificacao').select('*').eq('user_id', userId).single();
  return data || { xp: 0, streak: 0 };
}

async function sbSaveGamificacao(userId, xp, streak) {
  const hoje = new Date().toISOString().split('T')[0];
  await sb.from('gamificacao').upsert({
    user_id: userId, xp, streak,
    ultimo_registro: hoje, atualizado_em: new Date().toISOString()
  }, { onConflict: 'user_id' });
}

// ── Sincronização ─────────────────────
async function syncFromSupabase(userId) {
  try {
    const [perfil, agua, pesos, gami, refeicoes] = await Promise.all([
      sbGetPerfil(userId),
      sbGetAgua(userId),
      sbGetPesos(userId),
      sbGetGamificacao(userId),
      sbGetRefeicoes(userId)
    ]);

    if (perfil) {
      APP.profile = {
        name: perfil.nome || APP.profile?.name || 'Usuário',
        weight: perfil.peso || 78,
        height: perfil.altura || 175,
        age: perfil.idade || 30,
        gender: perfil.genero || 'm',
        goal: perfil.objetivo || 'lose',
        activity: perfil.atividade || 'mod',
        restrictions: []
      };
      APP.calc = calcProfile(APP.profile);
    }

    APP.water = agua || 0;
    APP.weightHistory = pesos.length ? pesos : [{ date: new Date().toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}), peso: APP.profile?.weight || 78 }];
    APP.xp = gami.xp || 0;
    APP.streak = gami.streak || 0;
    APP.meals = (refeicoes || []).map(r => ({
      name: r.nome, emoji: r.emoji || '🍽️',
      cal: r.calorias || 0, prot: r.proteina || 0,
      carb: r.carbo || 0, fat: r.gordura || 0,
      time: r.hora?.slice(0,5) || '12:00', type: r.tipo || 'almoco'
    }));

    // Save local cache
    save('v_profile', APP.profile);
    save('v_weights', APP.weightHistory);
    localStorage.setItem('v_xp', APP.xp);
    localStorage.setItem('v_streak', APP.streak);
  } catch (e) {
    console.warn('Sync error:', e);
  }
}

async function syncToSupabase() {
  const user = await sbGetUser();
  if (!user) return;
  try {
    await Promise.all([
      sbSaveAgua(user.id, APP.water),
      sbSaveGamificacao(user.id, APP.xp, APP.streak),
    ]);
    if (APP.profile) {
      await sbSavePerfil(user.id, {
        nome: APP.profile.name,
        peso: APP.profile.weight,
        altura: APP.profile.height,
        idade: APP.profile.age,
        genero: APP.profile.gender,
        objetivo: APP.profile.goal,
        atividade: APP.profile.activity,
        email: APP.user?.email
      });
    }
  } catch (e) {
    console.warn('Sync to Supabase error:', e);
  }
}

// Auto-sync a cada 30 segundos
setInterval(syncToSupabase, 30000);
</script>

/* ═══════════════════════════════════════
   CALCULATIONS
═══════════════════════════════════════ */
function calcProfile(p) {
  if (!p) return null;
  const peso = parseFloat(p.weight), h = parseFloat(p.height), idade = parseInt(p.age);
  const male = p.gender === 'm';
  const imc = +(peso / ((h/100)**2)).toFixed(1);
  const imcClass = imc < 18.5 ? 'Abaixo do peso' : imc < 25 ? 'Normal' : imc < 30 ? 'Sobrepeso' : imc < 35 ? 'Obesidade I' : 'Obesidade II+';
  const tmb = Math.round(male ? 10*peso+6.25*h-5*idade+5 : 10*peso+6.25*h-5*idade-161);
  const acts = {sed:1.2,light:1.375,mod:1.55,active:1.725};
  const tdee = Math.round(tmb*(acts[p.activity]||1.375));
  const goalMap = {lose:Math.max(1200,tdee-400),gain:tdee+300,maintain:tdee,health:tdee};
  const meta = goalMap[p.goal]||tdee;
  const prot = Math.round(peso*1.8), fat = Math.round((meta*.28)/9), carb = Math.round((meta-prot*4-fat*9)/4);
  const agua = Math.round(peso*35), aguaCopos = Math.round(agua/250);
  const pesoIdeal = male ? +(50+2.3*((h-152.4)/2.54)).toFixed(1) : +(45.5+2.3*((h-152.4)/2.54)).toFixed(1);
  const pesoMeta = p.goal==='lose' ? Math.max(pesoIdeal,peso-10) : p.goal==='gain' ? peso+5 : peso;
  const semanas = Math.ceil(Math.abs(peso-pesoMeta)/0.75);
  return {imc,imcClass,tmb,tdee,meta,prot,fat,carb,agua,aguaCopos,pesoIdeal,pesoMeta,semanas,peso,altura:h};
}

function calcDailyScore() {
  const c = APP.calc;
  if (!c) return 0;
  const mealScore = Math.min(APP.meals.length / 5, 1) * 30;
  const waterScore = Math.min(APP.water / (c.aguaCopos||8), 1) * 25;
  const streakScore = Math.min(APP.streak / 30, 1) * 20;
  const qualScore = APP.meals.length > 0 ? 25 : 0;
  return Math.round(mealScore + waterScore + streakScore + qualScore);
}

   UI HELPERS
═══════════════════════════════════════ */
function toast(msg, type='info', duration=3000) {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span>${{success:'✅',error:'❌',info:'💬'}[type]||'💬'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

function openModal(title, bodyHTML) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function svgRing(size, stroke, pct, color, bg='#21262d') {
  const r = (size-stroke)/2, circ = 2*Math.PI*r, offset = circ*(1-pct/100);
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${bg}" stroke-width="${stroke}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset .8s ease"/></svg>`;
}

function confetti() {
  const colors = ['#22c55e','#38bdf8','#f97316','#fbbf24','#a78bfa','#f472b6'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}%;top:-20px;background:${colors[i%colors.length]};width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;animation-delay:${Math.random()*1}s;animation-duration:${2+Math.random()*1}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3500);
  }
}

// ── Enhanced AI Response with context ──
function getAIResponse(msg) {
  return new Promise(resolve => {
    const delay = 1200 + Math.random()*800;
    setTimeout(() => {
      const msgLower = msg.toLowerCase();
      // Find best matching response
      for(const fn of COACH_RESPONSES) {
        const response = fn(msgLower);
        if(!response.includes('Baseado no seu perfil') && !response.includes('Me pergunte') && !response.includes('Posso te')) {
          resolve(response);
          return;
        }
      }
      // Default intelligent response
      const defaults = [
        `Ótima pergunta! Para responder melhor, me conta: qual é seu objetivo principal agora? Emagrecimento, ganho de massa, saúde geral ou performance esportiva? 🎯`,
        `Entendo! Baseado no seu perfil (${APP.profile?.weight||78}kg, meta ${APP.calc?.meta||1800}kcal), posso criar um plano personalizado. O que você prefere começar: alimentação, suplementação ou treino? 💪`,
        `Excelente! A chave do sucesso é consistência. Seu streak de ${APP.streak} dias mostra que você está comprometido! Me pergunte sobre qualquer nutriente, alimento ou estratégia. 🌱`,
        `Para te dar a melhor orientação: você tem alguma restrição alimentar? Intolerância à lactose, glúten, ou segue alguma dieta específica? Assim posso personalizar melhor! 🥗`,
      ];
      resolve(defaults[Math.floor(Math.random()*defaults.length)]);
    }, delay);
  });
}

function startAuth() {
  const auth = document.getElementById('auth-screen');
  auth.classList.add('active');
  renderAuth();
}

function renderAuth() {
  const auth = document.getElementById('auth-screen');
  const step = APP.authStep;
  auth.innerHTML = '';

  if (step === 'login') renderLogin();
  else if (step === 'register') renderRegister1();
  else if (step === 'register2') renderRegister2();
  else if (step === 'register3') renderRegister3();
  else if (step === 'register4') renderRegister4();
  else if (step === 'biometric') renderBiometricOffer();
  else if (step === 'pin') renderPinScreen();
}


async function doLogin() {
  const email = document.getElementById('a-email').value.trim();
  const pass = document.getElementById('a-pass').value;
  if (!email || !pass) { toast('Preencha email e senha','error'); return; }
  if (!/\S+@\S+\.\S+/.test(email)) { toast('Email inválido','error'); return; }
  const btn = document.getElementById('login-btn');
  btn.classList.add('btn-loading'); btn.disabled = true;

  const { data, error } = await sbSignIn(email, pass);

  if (error) {
    btn.classList.remove('btn-loading'); btn.disabled = false;
    if (error.message.includes('Invalid login')) toast('❌ Email ou senha incorretos','error');
    else if (error.message.includes('Email not confirmed')) toast('⚠️ Confirme seu email antes de entrar','info', 5000);
    else toast('❌ ' + error.message, 'error');
    return;
  }

  const user = data.user;
  APP.user = { email: user.email, name: user.user_metadata?.nome || email.split('@')[0], id: user.id };
  APP.session = data.session?.access_token || 'sess_' + Date.now();
  save('v_user', APP.user); save('v_session', APP.session);
  const remEl = document.getElementById('a-remember');
  if (remEl && remEl.checked) {
    localStorage.setItem('v_remember', '1');
  } else {
    localStorage.removeItem('v_remember');
    sessionStorage.setItem('v_tab_session', APP.session);
  }
  const remEl2 = document.getElementById('a-remember');
  if (remEl2 && remEl2.checked) { localStorage.setItem('v_remember','1'); } else { localStorage.removeItem('v_remember'); }

  // Load data from Supabase
  toast('🔄 Carregando seus dados...', 'info', 2000);
  await syncFromSupabase(user.id);

  APP.authStep = localStorage.getItem('v_biometric') ? 'app' : 'biometric';
  if (APP.authStep === 'biometric') { APP.authStep = 'biometric'; renderAuth(); }
  else { finishAuth(); }
}

async function completeRegister() {
  const rd = APP.registerData;
  const btn = document.querySelector('#register-btn');
  if(btn){ btn.disabled=true; btn.textContent='Criando conta...'; }

  // Create user in Supabase Auth
  const { data, error } = await sbSignUp(rd.email, rd.password, rd.name);

  if (error) {
    if(btn){ btn.disabled=false; btn.textContent='Criar conta'; }
    if (error.message.includes('already registered')) toast('❌ Este email já está cadastrado','error');
    else toast('❌ ' + error.message, 'error');
    return;
  }

  APP.user = { email: rd.email, name: rd.name, id: data.user?.id };
  APP.profile = {
    name: rd.name, weight: parseFloat(rd.weight), height: parseFloat(rd.height),
    age: rd.age||30, gender: rd.gender||'m', goal: rd.goal||'lose',
    activity: rd.activity||'mod', dob: rd.dob, restrictions:[]
  };
  APP.calc = calcProfile(APP.profile);
  APP.water = 0; APP.meals = [];
  APP.weightHistory = [{ date: new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}), peso: APP.profile.weight }];
  APP.session = data.session?.access_token || 'reg_' + Date.now();

  save('v_user', APP.user); save('v_profile', APP.profile);
  save('v_session', APP.session); save('v_weights', APP.weightHistory);

  // Save profile to Supabase
  if (data.user?.id) {
    await sbSavePerfil(data.user.id, {
      nome: rd.name, email: rd.email,
      peso: parseFloat(rd.weight), altura: parseFloat(rd.height),
      idade: rd.age||30, genero: rd.gender||'m',
      objetivo: rd.goal||'lose', atividade: rd.activity||'mod'
    });
    await sbAddPeso(data.user.id, parseFloat(rd.weight));
  }

  confetti();
  // Check if email confirmation needed
  if (!data.session) {
    toast('📧 Verifique seu email para confirmar o cadastro!', 'info', 6000);
    setTimeout(() => { APP.authStep = 'login'; renderAuth(); }, 3000);
  } else {
    APP.authStep = 'biometric'; renderAuth();
  }
}

function finishAuth() {
  if (!APP.calc && APP.profile) APP.calc = calcProfile(APP.profile);
  if (!APP.meals?.length) { APP.water=0; APP.meals=[]; }
  if (!APP.weightHistory?.length) APP.weightHistory = WEIGHT_HISTORY.map((p,i)=>({date:new Date(Date.now()-i*86400000).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}),peso:p})).reverse();
  document.getElementById('auth-screen').classList.remove('active');
  startApp();
}

function renderAnalysisResult() {

    </div>
    <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <span class="pill pill-orange">🔥 ${a.cal} kcal</span>
      <span class="pill pill-blue">💪 ${a.prot}g prot</span>
      <span class="pill pill-green">🌾 ${a.carb}g carb</span>
      <span class="pill pill-yellow">🧈 ${a.fat}g gord</span>

    <div class="nutrient-grid">
      ${[['Fe',a.nutrition?.iron||'1.8mg'],['Ca',a.nutrition?.calcium||'65mg'],['Na',a.nutrition?.sodium||'280mg'],['Vit A',a.nutrition?.vitA||'120µg'],['Vit C',a.nutrition?.vitC||'18mg'],['B12',a.nutrition?.b12||'0.8µg']].map(([l,v])=>`<div class="nutrient-cell"><div class="nutrient-val">${v}</div><div class="nutrient-label">${l}</div></div>`).join('')}

    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary" style="flex:1;padding:10px" onclick="addAnalyzedMeal()">+ Adicionar ao diário</button>
      <button class="btn btn-outline" style="flex:1;padding:10px" onclick="NUTR.analysis=null;navigate('nutrition')">Descartar</button>
    </div>
  </div>`;
}

function addAnalyzedMeal() {
  const a = NUTR.analysis;
  APP.meals.push({id:Date.now(),time:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),name:a.name,emoji:a.emoji,cal:a.cal,prot:a.prot,carb:a.carb,fat:a.fat,type:'meal'});
  addXP(20); toast('✅ Refeição adicionada! +20 XP','success');
  NUTR.analysis=null; navigate('nutrition');
}

function renderMealPlan() {
  const c = APP.calc||{};
  const meals = [
    {time:'07:30',icon:'☀️',name:'Café da manhã',cal:Math.round((c.meta||1800)*.25),items:'Omelete + pão integral + fruta'},
    {time:'10:00',icon:'🍎',name:'Lanche manhã',cal:Math.round((c.meta||1800)*.1),items:'Iogurte grego + granola'},
    {time:'13:00',icon:'🍽️',name:'Almoço',cal:Math.round((c.meta||1800)*.35),items:'Proteína + arroz integral + feijão + salada'},
    {time:'16:00',icon:'🥪',name:'Lanche tarde',cal:Math.round((c.meta||1800)*.1),items:'Fruta + castanhas'},
    {time:'19:30',icon:'🌙',name:'Jantar',cal:Math.round((c.meta||1800)*.2),items:'Proteína leve + legumes + carboidrato moderado'},
  ];
  return `<div style="padding:0 16px;margin-bottom:12px">
    ${meals.map(m=>`<div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">

      <div style="flex:1"><div style="font-size:13px;font-weight:700">${m.name} <span style="color:var(--text3);font-size:11px">${m.time}</span></div><div style="font-size:11px;color:var(--text2);margin-top:2px">${m.items}</div></div>
      <div style="font-size:12px;font-weight:700;color:var(--orange);white-space:nowrap">${m.cal} kcal</div>
    </div>`).join('')}
  </div>`;
}

function analyzeTextMeal() {
  openModal('Descrever refeição', `
    <div class="input-wrap"><label class="input-label">Descreva sua refeição</label><textarea class="input" id="meal-desc" rows="3" placeholder="Ex: arroz integral, frango grelhado e salada verde com azeite" style="resize:none"></textarea></div>
    <button class="btn btn-primary btn-full" onclick="analyzeDescription()" style="padding:13px">🔍 Analisar com IA</button>`);
}

function analyzeDescription() {
  const desc = document.getElementById('meal-desc')?.value;
  if (!desc?.trim()) { toast('Descreva a refeição','error'); return; }
  closeModal(); NUTR.loading=true; navigate('nutrition');
  analyzeFood(desc).then(result => {
    NUTR.analysis=result; NUTR.loading=false; navigate('nutrition');
    toast('✅ Análise concluída!','success'); addXP(15);
  });
}

function attachNutrition(screen) {
  const camInput = screen.querySelector('#food-cam-capture');
  const gallInput = screen.querySelector('#food-gallery');
  if (camInput) camInput.addEventListener('change', handleFoodPhoto);
  if (gallInput) gallInput.addEventListener('change', handleFoodPhoto);
}

function handleFoodPhoto(e) {
  const file = e.target.files?.[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    NUTR.imagePreview = ev.target.result;
    NUTR.loading = true; navigate('nutrition');
    analyzeFood('food photo').then(result=>{
      NUTR.analysis=result; NUTR.loading=false; navigate('nutrition');
      toast('✅ Foto analisada!','success'); addXP(20);
    });
  };
  reader.readAsDataURL(file); e.target.value='';
}

const REC = {filter:[], mealType:'all', openRecipe:null, search:''};

function renderRecipes() {
  if (REC.openRecipe) return renderRecipeDetail(REC.openRecipe);
  const filters=[
    {type:'meal',vals:[['all',t('filter_all')],['breakfast',t('filter_breakfast')],['lunch',t('filter_lunch')],['snack',t('filter_snack')],['dinner',t('filter_dinner')]]},
    {type:'goal',vals:[['lose',t('filter_lose')],['gain',t('filter_gain')],['maintain','Manutenção']]},
    {type:'tag',vals:[['Vegano',t('filter_vegan')],['Sem glúten',t('filter_gluten')],['Rápido','Rápido'],['Alta proteína','Alta proteína'],['Low Carb','Low Carb']]},
  ];
  let filtered = RECIPES;
  if (REC.mealType && REC.mealType !== 'all') filtered = filtered.filter(r=>r.cat===REC.mealType);
  if (REC.filter.length) filtered = filtered.filter(r=>REC.filter.every(f=>r.tags.includes(f)||r.goal===f));
  if (REC.search) filtered = filtered.filter(r=>r.name.toLowerCase().includes(REC.search.toLowerCase()));
  return `
  <div class="screen-header"><div class="screen-title">🍴 ${t('recipes')}</div></div>
  <div style="padding:0 16px;margin-bottom:12px">

  </div>
  <!-- Filter chips -->
  <div style="padding:0 16px;margin-bottom:6px">
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600">POR HORÁRIO</div>
    <div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px">
      ${[['all',t('filter_all')],['breakfast',t('filter_breakfast')],['lunch',t('filter_lunch')],['snack',t('filter_snack')],['dinner',t('filter_dinner')],['juice','🥤 Suco'],['dessert','🍮 Sobremesa'],['special','⭐ Especial']].map(([v,l])=>`<button class="tab-btn ${REC.mealType===v?'active':''}" onclick="REC.mealType='${v}';navigate('recipes')">${l}</button>`).join('')}
    </div>
  </div>
  <div style="padding:0 16px;margin-bottom:12px">
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600">FILTROS AVANÇADOS</div>
    <div class="filter-chips">
      ${[['lose',t('filter_lose')],['gain',t('filter_gain')],['Vegano',t('filter_vegan')],['Sem glúten',t('filter_gluten')],['Low Carb','Low Carb'],['Alta proteína','Alta proteína'],['Sem lactose','Sem lactose'],['Detox','Detox'],['Prebiótico','Prebiótico'],['Gestante','🤰 Gestante'],['Período menstrual','🩸 Período'],['Pré-treino','⚡ Pré-Treino'],['Pós-treino','💪 Pós-Treino'],['Ômega-3','🐟 Ômega-3'],['Ferro','⚡ Ferro'],['Anti-inflamatório','🌿 Anti-infla.']].map(([v,l])=>`<button class="filter-chip ${REC.filter.includes(v)?'active':''}" onclick="toggleFilter('${v}')">${l}</button>`).join('')}
    </div>
  </div>
  <div id="rec-list">${renderRecipeList(filtered)}</div>`;
}

function toggleFilter(f) {
  const idx = REC.filter.indexOf(f);
  if(idx>=0) REC.filter.splice(idx,1); else REC.filter.push(f);
  navigate('recipes');
}

function renderRecipeList(list) {
  if(!list) {
    let l = RECIPES;
    if(REC.mealType&&REC.mealType!=='all') l=l.filter(r=>r.cat===REC.mealType||(REC.mealType==='special'&&r.special));
    if(REC.filter.length) l=l.filter(r=>REC.filter.every(f=>r.tags.includes(f)||r.goal===f||r.special===f.toLowerCase().replace('🤰 ','').replace('🩸 ','').replace('⚡ ','').replace('💪 ','')));
    if(REC.search) l=l.filter(r=>r.name.toLowerCase().includes(REC.search.toLowerCase()));
    list=l;
  }
  if(!list.length) return `<div style="text-align:center;padding:40px;color:var(--text3)">Nenhuma receita encontrada com esses filtros 🤔</div>`;
  return `<div style="padding:0 16px">
    ${list.map(r=>`<div class="recipe-card" onclick="REC.openRecipe=${r.id};navigate('recipes')" style="${r.special==='gestante'?'border-color:rgba(249,168,212,.5);':r.special==='menstrual'?'border-color:rgba(244,114,182,.5);':''}">
      <div class="recipe-hero" style="${r.special==='gestante'?'background:rgba(249,168,212,.08);':r.special==='menstrual'?'background:rgba(244,114,182,.08);':''}"><span style="font-size:64px">${r.emoji}</span>
      <div class="recipe-hero-overlay"><div class="recipe-tags">${r.tags.slice(0,2).map(tag=>`<span class="pill pill-green" style="font-size:9px">${tag}</span>`).join('')}${r.special?`<span class="pill" style="font-size:9px;background:${r.special==='gestante'?'rgba(249,168,212,.25)':'rgba(244,114,182,.25)'};color:${r.special==='gestante'?'#fda4af':'#f9a8d4'};border:none;margin-left:3px">${r.special==='gestante'?'🤰 Gestante':'🌸 Menstrual'}</span>`:''}
      </div></div></div>
      <div class="recipe-body">
        <div class="recipe-name">${r.name}</div>
        <div class="recipe-meta"><span>⏱ ${r.time}</span><span>🎯 ${r.diff}</span><span>🔥 ${r.cal} kcal</span><span class="stars">${Array.from({length:5},(_,i)=>`<span class="star ${i<Math.round(r.rating)?'filled':''}">★</span>`).join('')} ${r.rating}</span></div>
        ${r.specialNote?`<div style="margin-top:6px;font-size:11px;color:${r.special==='gestante'?'#fda4af':'#f9a8d4'};background:${r.special==='gestante'?'rgba(249,168,212,.07)':'rgba(244,114,182,.07)'};padding:6px 8px;border-radius:6px;line-height:1.5;border-left:2px solid ${r.special==='gestante'?'#fda4af':'#f9a8d4'}">${r.specialNote}</div>`:''}
      </div>
    </div>`).join('')}
  </div>`;
}

  const r = RECIPES.find(r=>r.id===id); if(!r) return '';
  const scoreCol = r.score>=7?'var(--green)':r.score>=4?'var(--orange)':'var(--red)';

      <div class="macro-row" style="margin-bottom:8px">
        ${[['🔥',r.cal,'kcal'],['💪',r.prot+'g','proteína'],['🌾',r.carb+'g','carbos'],['🧈',r.fat+'g','gordura'],['🌿',r.fiber+'g','fibra']].map(([e,v,l])=>`<div class="macro-card" style="text-align:center"><div style="font-size:16px">${e}</div><div style="font-size:14px;font-weight:700">${v}</div><div style="font-size:9px;color:var(--text3)">${l}</div></div>`).join('')}

    <div style="margin-top:16px;display:flex;gap:10px">

function renderHydration() {
  const c = APP.calc||{aguaCopos:8,agua:2000};
  const pct = Math.min(Math.round((APP.water/c.aguaCopos)*100),100);
  const hist = WATER_HISTORY;
  const maxH = Math.max(...hist);
  const tips = ['Beba um copo de água ao acordar para ativar o metabolismo! ☀️','Adicione rodelas de limão ou hortelã para tornar a água mais saborosa 🍋','A cor da urina é um ótimo indicador: amarelo claro = bem hidratado 💛','Coma alimentos ricos em água: pepino, melancia, morango 🍉','Antes do treino, hidrate-se com 500ml para melhor desempenho 💪'];
  const todayTip = tips[new Date().getDate()%tips.length];
  return `
  <div class="screen-header"><div class="screen-title">💧 ${t('hydration')}</div></div>
  <div class="water-hero">
    <div style="position:relative;width:180px;height:180px;margin:0 auto 20px">
      ${svgRing(180,14,pct,'var(--blue)','#1e2530')}
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
        <div class="water-big-num">${APP.water}</div>
        <div style="font-size:12px;color:var(--text3)">de ${c.aguaCopos} copos</div>
        <div style="font-size:11px;color:var(--blue);margin-top:2px">${APP.water*250}ml</div>
        <div style="font-size:11px;color:var(--text3)">${pct}%</div>

    </div>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:8px;padding:0 16px;justify-content:center;margin-bottom:16px">
    ${Array.from({length:c.aguaCopos},(_,i)=>`<div onclick="setWater(${i+1})" style="font-size:28px;cursor:pointer;transition:all .2s;opacity:${i<APP.water?1:.25};transform:${i<APP.water?'scale(1.1)':'scale(1)'}">🥤</div>`).join('')}
  </div>

  <div class="water-buttons">
    ${[[200,'💧 200ml'],[350,'💧 350ml'],[500,'💧 500ml'],[1000,'💧 1L']].map(([ml,l])=>`<button class="water-add-btn" onclick="addWater(${ml})">${l}</button>`).join('')}
  </div>
  ${APP.water>0?`<div style="text-align:center;margin-bottom:12px"><button class="btn btn-sm btn-ghost" onclick="APP.water=Math.max(0,APP.water-1);navigate('hydration')" style="color:var(--text3)">↩ Desfazer último</button></div>`:''}

  <div class="water-tip" style="margin-bottom:16px">
    <div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:4px">💡 Dica de hidratação</div>
    <div class="water-tip-text">${todayTip}</div>
  </div>

  <div class="section-title">Últimos 7 dias</div>
  <div style="padding:0 16px;margin-bottom:16px">
    <div class="history-bar-row">
      ${hist.map(h=>`<div class="history-bar" style="height:${Math.round((h/maxH)*100)}%;background:${h>=c.aguaCopos?'var(--blue)':'rgba(56,189,248,.3)'}"></div>`).join('')}
    </div>
    <div class="history-labels">${['S','T','Q','Q','S','S','D'].map(d=>`<div class="history-label">${d}</div>`).join('')}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:8px;text-align:center">Média: ${Math.round(hist.reduce((a,b)=>a+b,0)/hist.length)} copos/dia · Meta: ${c.aguaCopos} copos</div>
  </div>`;
}
function addWater(ml) {
  const cups = Math.round(ml/250);
  APP.water = Math.min(APP.water+cups, (APP.calc?.aguaCopos||8)+4);
  toast(t('water_added',ml),'success'); addXP(5);
  navigate('hydration');
}
function setWater(n) {
  APP.water=n;
  sbGetUser().then(u => { if(u) sbSaveAgua(u.id, APP.water); });
  navigate('hydration');
}

const FAST = {protocol:'16:8', active:false, startTime:null, elapsed:0, interval:null};
const PROTOCOLS = [
  {id:'16:8',name:'16:8',fast:16,eat:8,desc:'Jejua 16h, come em 8h. O mais popular.',popular:true},
  {id:'18:6',name:'18:6',fast:18,eat:6,desc:'Jejua 18h, come em 6h. Avançado.'},
  {id:'20:4',name:'20:4',fast:20,eat:4,desc:'Jejua 20h, janela de 4h. Warrior Diet.'},
  {id:'OMAD',name:'OMAD',fast:23,eat:1,desc:'Uma refeição por dia. Experts apenas.'},
  {id:'5:2',name:'5:2',fast:0,eat:0,desc:'5 dias normal, 2 dias <500kcal/dia.'},
];

function renderFasting() {
  const proto = PROTOCOLS.find(p=>p.id===FAST.protocol)||PROTOCOLS[0];
  const elapsed = FAST.active && FAST.startTime ? Math.min((Date.now()-FAST.startTime)/3600000, proto.fast) : 0;
  const pct = proto.fast>0 ? Math.round((elapsed/proto.fast)*100) : 0;
  const remaining = proto.fast - elapsed;
  const statusColor = FAST.active?'var(--purple)':'var(--text3)';
  return `
  <div class="screen-header"><div class="screen-title">⏱️ ${t('fasting')}</div></div>
  <div class="fast-hero">
    <div style="position:relative;width:200px;height:200px;margin:0 auto 16px">
      ${svgRing(200,14,pct,'var(--purple)','#1e2530')}
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
        <div class="fast-time" style="color:var(--purple)">${formatTime(elapsed*3600)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${FAST.active?'de '+proto.fast+'h':'Pausado'}</div>
        <div style="font-size:11px;font-weight:700;color:${statusColor};margin-top:4px;text-transform:uppercase;letter-spacing:.5px">${FAST.active?t('fasting_active'):t('eating_window')}</div>
      </div>
    </div>
    ${FAST.active&&remaining>0?`<div style="background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:var(--radius-sm);padding:10px 16px;margin-bottom:16px;text-align:center"><div style="font-size:12px;color:var(--purple);font-weight:700">⏰ Encerra em ${formatTime(remaining*3600)}</div></div>`:''}
    <button class="btn btn-primary btn-full" onclick="toggleFast()" style="padding:15px;max-width:280px;margin:0 auto;display:block;border-radius:var(--radius-lg);background:${FAST.active?'rgba(248,113,113,.15)':'var(--gradient)'};color:${FAST.active?'var(--red)':'#000'};border:${FAST.active?'1.5px solid rgba(248,113,113,.4)':'none'}">${FAST.active?t('stop_fast'):t('start_fast')}</button>
  </div>

  <div class="section-title">Protocolos</div>
  <div style="padding:0 16px;margin-bottom:16px">
    ${PROTOCOLS.map(p=>`<div class="protocol-card ${FAST.protocol===p.id?'active':''}" onclick="FAST.protocol='${p.id}';navigate('fasting')">
      <div><div class="protocol-name">${p.name} ${p.popular?'<span style="font-size:10px;padding:2px 6px;border-radius:99px;background:rgba(34,197,94,.15);color:var(--green);margin-left:6px">Popular</span>':''}</div><div class="protocol-desc">${p.desc}</div></div>
      ${FAST.protocol===p.id?'<span style="color:var(--purple);font-size:20px">✓</span>':'<span style="color:var(--text3)">›</span>'}
    </div>`).join('')}
  </div>

  <div class="section-title">O que consumir durante o jejum?</div>
  <div style="padding:0 16px;margin-bottom:16px">
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px">✅ Permitido</div>${['Água','Água com gás','Café preto','Chá sem açúcar','Eletrólitos'].map(i=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">• ${i}</div>`).join('')}</div>
        <div><div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px">❌ Quebra jejum</div>${['Qualquer alimento','Sucos','Refrigerante','Leite / cream','Adoçante calórico'].map(i=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">• ${i}</div>`).join('')}</div>
      </div>
    </div>
  </div>`;
}

function formatTime(secs) {
  const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=Math.floor(secs%60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function toggleFast() {
  if (FAST.active) {
    FAST.active=false; clearInterval(FAST.interval);
    toast('Jejum encerrado! ✅','success'); addXP(30);
  } else {
    FAST.active=true; FAST.startTime=Date.now();
    FAST.interval=setInterval(()=>navigate('fasting'),1000);
    toast('Jejum iniciado! ⏱️','success');
  }
  navigate('fasting');
}
