</style>
</head>

function renderRegister(){

  var c='';

  else if(s===3){var a=['s3a','s3b','s3c','s3d','s3e'];c='<div class="card-title">'+t('s3t')+'</div><div class="option-grid">';a.forEach(function(k){var v=t(k);c+='<button class="option-btn '+(p.activity===v?'selected':'')+'" onclick="APP.profile.activity=\''+esc(v)+'\';renderRegister()">'+v+'</button>'});c+='</div><div class="step-nav"><button class="btn-outline" onclick="APP.regStep=2;renderRegister()">'+t('back')+'</button><button class="btn-primary" onclick="if(!APP.profile.activity){showToast(t(\'tRegFill\'));return}APP.regStep=4;renderRegister()" '+(p.activity?'':'disabled')+'>'+t('next')+'</button></div>'}
  else if(s===4){var rs=['s4a','s4b','s4c','s4d','s4e','s4f'];c='<div class="card-title">'+t('s4t')+'</div><div class="option-grid">';rs.forEach(function(k){var v=t(k);c+='<button class="option-btn '+(p.restrictions===v?'selected':'')+'" onclick="APP.profile.restrictions=\''+esc(v)+'\';renderRegister()">'+v+'</button>'});c+='</div><div class="step-nav"><button class="btn-outline" onclick="APP.regStep=3;renderRegister()">'+t('back')+'</button><button class="btn-primary" onclick="if(!APP.profile.restrictions){showToast(t(\'tRegFill\'));return}APP.regStep=5;renderRegister()" '+(p.restrictions?'':'disabled')+'>'+t('next')+'</button></div>'}
  else if(s===5){c='<div class="card-title">'+t('s5t')+'</div><div class="field"><label class="field-label">'+t('nameL')+'</label><input type="text" class="field-input" id="r-name" value="'+(p.name||'')+'" placeholder="'+t('nameL')+'"></div><div class="field"><label class="field-label">'+t('labelEmail')+'</label><input type="email" class="field-input" id="r-email" value="'+(p.email||'')+'" placeholder="'+t('phEmail')+'" autocomplete="email"></div><div class="field"><label class="field-label">'+t('labelSenha')+'</label><input type="password" class="field-input" id="r-pass" placeholder="'+t('phPass')+'"></div><div class="step-nav"><button class="btn-outline" onclick="APP.regStep=4;renderRegister()">'+t('back')+'</button><button class="btn-primary" onclick="doRegister()">'+t('createBtn')+'</button></div>'}

  syncMeta();

function renderHome(){
  APP.screen='home';var p=APP.profile;
  var r=document.getElementById('app-root');
  r.innerHTML=langBar()+brandH()+'<div class="home-card"><div class="home-greeting">'+t('hGreet')+', '+(p.name.split(' ')[0]||'')+'!</div><div class="home-sub">'+t('hSub')+'</div><div class="home-stats"><div class="home-stat"><div class="home-val">'+p.weight+'</div><div class="home-label">'+t('weight')+'</div></div><div class="home-stat"><div class="home-val">'+p.height+'</div><div class="home-label">'+t('heightL')+'</div></div><div class="home-stat"><div class="home-val">'+p.age+'</div><div class="home-label">'+t('age')+'</div></div></div><div class="home-info"><div class="home-info-label">'+t('hGoal')+'</div><div class="home-info-val">'+p.goal+'</div></div><div class="home-info"><div class="home-info-label">'+t('hAct')+'</div><div class="home-info-val">'+p.activity+'</div></div><button class="btn-outline" style="margin-top:8px" onclick="APP.screen=\'login\';APP.profile={name:\'\',email:\'\',goal:\'\',gender:\'\',age:\'\',weight:\'\',height:\'\',activity:\'\',restrictions:\'\'};renderLogin()">'+t('logout')+'</button></div><div class="footer"><div class="footer-version">VitalIA v2.0</div></div>';

function doLogin(){var e=document.getElementById('a-email').value.trim(),p=document.getElementById('a-pass').value;if(!e||!p){showToast(t('tFill'));return}showToast(t('tAuth'));setTimeout(function(){APP.profile.name=e.split('@')[0];APP.profile.email=e;APP.profile.goal=t('s1c');APP.profile.weight='70';APP.profile.height='170';APP.profile.age='28';APP.profile.activity=t('s3c');renderHome()},1200)}
function tryBiometric(){showToast(t('tBio'));setTimeout(function(){APP.profile={name:'Usuário',email:'bio@vitalia.app',goal:t('s1c'),gender:t('male'),age:'28',weight:'70',height:'170',activity:t('s3c'),restrictions:t('s4a')};renderHome()},1500)}
function saveStep2(){var a=document.getElementById('r-age').value,w=document.getElementById('r-weight').value,h=document.getElementById('r-height').value;if(!APP.profile.gender||!a||!w||!h){showToast(t('tRegFill'));return}APP.profile.age=a;APP.profile.weight=w;APP.profile.height=h;APP.regStep=3;renderRegister()}
function doRegister(){var n=document.getElementById('r-name').value.trim(),e=document.getElementById('r-email').value.trim(),p=document.getElementById('r-pass').value;if(!n||!e||!p){showToast(t('tRegFill'));return}if(p.length<8){showToast(t('tRegPass'));return}APP.profile.name=n;APP.profile.email=e;showToast(t('tCreating'));setTimeout(function(){renderHome()},1200)}
function togglePw(){var i=document.getElementById('a-pass');i.type=i.type==='password'?'text':'password'}
var toastTmr;function showToast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastTmr);toastTmr=setTimeout(function(){e.classList.remove('show')},2500)}
function toggleDD(){var d=document.getElementById('langDD');d.classList.toggle('open')}
function setLang(l){APP.lang=l;try{localStorage.setItem('vitalia_lang',l)}catch(e){}if(APP.authStep==='register')renderRegister();else if(APP.screen==='home')renderHome();else renderLogin()}
function openModal(){document.getElementById('connectionsModal').classList.add('open');updateModal()}
function closeModal(){document.getElementById('connectionsModal').classList.remove('open')}
document.getElementById('connectionsModal').addEventListener('click',function(e){if(e.target===e.currentTarget)closeModal()});
function connectSocial(p){showToast(p+': '+t('tSocial'))}
document.addEventListener('click',function(e){var d=document.getElementById('langDD');if(d&&!e.target.closest('.lang-bar'))d.classList.remove('open')});
(function(){try{var s=localStorage.getItem('vitalia_lang');if(s&&L[s])APP.lang=s}catch(e){}renderLogin()})();
</script>
