const REC = {filter:[], mealType:'all', openRecipe:null, search:''};

function renderRecipes() {
  if (REC.openRecipe) return renderRecipeDetail(REC.openRecipe);
  const filters=[
    {type:'meal',vals:[['all',t('filter_all')],['breakfast',t('filter_breakfast')],['lunch',t('filter_lunch')],['snack',t('filter_snack')],['dinner',t('filter_dinner')]]},
    {type:'goal',vals:[['lose',t('filter_lose')],['gain',t('filter_gain')],['maintain','Manutenção']]},
    {type:'tag',vals:[['Vegano',t('filter_vegan')],['Sem glúten',t('filter_gluten')],['Rápido','Rápido'],['Alta proteína','Alta proteína'],['Low Carb','Low Carb']]},
  ];
  let filtered = RECIPES;
  if (REC.mealType && REC.mealType !== 'all') filtered = filtered.filter(r=>r.cat===REC.mealType);
  if (REC.filter.length) filtered = filtered.filter(r=>REC.filter.some(f=>r.tags.includes(f)||r.goal===f));
  if (REC.search) filtered = filtered.filter(r=>r.name.toLowerCase().includes(REC.search.toLowerCase()));
  return `
  <div class="screen-header"><div class="screen-title">🍴 ${t('recipes')}</div></div>
  <div style="padding:0 16px;margin-bottom:12px">
    <input class="input" placeholder="🔍 Buscar receitas..." value="${REC.search}" oninput="REC.search=this.value;REC.showAllResults=false;document.getElementById('rec-list').innerHTML=renderRecipeList()" id="rec-search">
  </div>
  <!-- Filter chips -->
  <div style="padding:0 16px;margin-bottom:6px">
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600">POR HORÁRIO</div>
    <div style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px">
      ${[['all',t('filter_all')],['breakfast',t('filter_breakfast')],['lunch',t('filter_lunch')],['snack',t('filter_snack')],['dinner',t('filter_dinner')],['juice','🥤 Suco'],['dessert','🍮 Sobremesa'],['special','⭐ Especial']].map(([v,l])=>`<button class="tab-btn ${REC.mealType===v?'active':''}" onclick="REC.mealType='${v}';navigate('recipes')">${l}</button>`).join('')}
    </div>
  </div>
  <div style="padding:0 16px;margin-bottom:12px">
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600">FILTROS AVANÇADOS</div>
    <div class="filter-chips">
      ${[['lose',t('filter_lose')],['gain',t('filter_gain')],['Vegano',t('filter_vegan')],['Sem glúten',t('filter_gluten')],['Low Carb','Low Carb'],['Alta proteína','Alta proteína'],['Sem lactose','Sem lactose'],['Detox','Detox'],['Prebiótico','Prebiótico'],['Gestante','🤰 Gestante'],['Período menstrual','🩸 Período'],['Pré-treino','⚡ Pré-Treino'],['Pós-treino','💪 Pós-Treino'],['Ômega-3','🐟 Ômega-3'],['Ferro','⚡ Ferro'],['Anti-inflamatório','🌿 Anti-infla.']].map(([v,l])=>`<button class="filter-chip ${REC.filter.includes(v)?'active':''}" onclick="toggleFilter('${v}')">${l}</button>`).join('')}
    </div>
  </div>
  <div id="rec-list">${renderRecipeList(filtered)}</div>`;
}

function toggleFilter(f) {
  if(REC.filter.length===1 && REC.filter[0]===f) { REC.filter=[]; }
  else { REC.filter=[f]; }
  navigate('recipes');
}

function renderRecipeList(list) {
  if(!list) {
    let l = RECIPES;
    if(REC.mealType&&REC.mealType!=='all') l=l.filter(r=>r.cat===REC.mealType||(REC.mealType==='special'&&r.special));
    if(REC.filter.length) l=l.filter(r=>REC.filter.every(f=>r.tags.includes(f)||r.goal===f||r.special===f.toLowerCase().replace('🤰 ','').replace('🩸 ','').replace('⚡ ','').replace('💪 ','')));
    if(REC.search) {
      const q = REC.search.toLowerCase().trim();
      l = l.filter(r =>
        r.name.toLowerCase().includes(q) ||
        (r.tags && r.tags.some(t => t.toLowerCase().includes(q))) ||
        (r.ingredients && r.ingredients.some(ing => ing.toLowerCase().includes(q)))
      );
    }
    list=l;
  }
  if(!list.length) {
    if(REC.search) return `<div style="text-align:center;padding:40px">
      <div style="font-size:40px;margin-bottom:12px">🔍</div>
      <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px">Nenhuma receita encontrada</div>
      <div style="font-size:13px;color:var(--text3)">Tente: frango, aveia, detox, gestante, ovo...</div>
    </div>`;
    return `<div style="text-align:center;padding:40px;color:var(--text3)">Nenhuma receita com esses filtros 🤔</div>`;
  }
  // When searching: show only FIRST match and offer to see more
  if(REC.search && list.length > 0 && !REC.showAllResults) {
    const first = list[0];
    const scoreCol = first.score>=7?'var(--green)':'var(--orange)';
    return `<div style="padding:16px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px;text-align:center">
        💡 ${list.length} receita(s) encontrada(s) para "<b>${REC.search}</b>"
      </div>
      <div class="recipe-card" onclick="REC.openRecipe=${first.id};navigate('recipes')" style="${first.special==='gestante'?'border-color:rgba(249,168,212,.5);':first.special==='menstrual'?'border-color:rgba(244,114,182,.5);':''}">
        <div class="recipe-hero" style="${first.special==='gestante'?'background:rgba(249,168,212,.08);':first.special==='menstrual'?'background:rgba(244,114,182,.08);':''}">
          <span style="font-size:64px">${first.emoji}</span>
          <div class="recipe-hero-overlay"><div class="recipe-tags">
            ${first.tags.slice(0,2).map(tag=>`<span class="pill pill-green" style="font-size:9px">${tag}</span>`).join('')}
          </div></div>
        </div>
        <div class="recipe-body">
          <div class="recipe-name">${first.name}</div>
          <div class="recipe-meta">
            <span>⏱ ${first.time}</span><span>🎯 ${first.diff}</span>
            <span>🔥 ${first.cal} kcal</span>
            <span class="stars">${Array.from({length:5},(_,i)=>`<span class="star ${i<Math.round(first.rating)?'filled':''}">★</span>`).join('')} ${first.rating}</span>
          </div>
        </div>
      </div>
      ${list.length > 1 ? `
      <button onclick="REC.showAllResults=true;document.getElementById('rec-list').innerHTML=renderRecipeList()" 
        style="width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px">
        📋 Ver todas as ${list.length} receitas com "${REC.search}"
      </button>` : ''}
    </div>`;
  }
  // Limit display to 30 for performance (always)
  const showList = list.slice(0, 30);
  return `<div style="padding:0 16px">
    ${showList.map(r=>`<div class="recipe-card" onclick="REC.openRecipe=${r.id};navigate('recipes')" style="${r.special==='gestante'?'border-color:rgba(249,168,212,.5);':r.special==='menstrual'?'border-color:rgba(244,114,182,.5);':''}">
      <div class="recipe-hero" style="${r.special==='gestante'?'background:rgba(249,168,212,.08);':r.special==='menstrual'?'background:rgba(244,114,182,.08);':''}"><span style="font-size:64px">${r.emoji}</span>
      <div class="recipe-hero-overlay"><div class="recipe-tags">${r.tags.slice(0,2).map(tag=>`<span class="pill pill-green" style="font-size:9px">${tag}</span>`).join('')}${r.special?`<span class="pill" style="font-size:9px;background:${r.special==='gestante'?'rgba(249,168,212,.25)':'rgba(244,114,182,.25)'};color:${r.special==='gestante'?'#fda4af':'#f9a8d4'};border:none;margin-left:3px">${r.special==='gestante'?'🤰 Gestante':'🌸 Menstrual'}</span>`:''}
      </div></div></div>
      <div class="recipe-body">
        <div class="recipe-name">${r.name}</div>
        <div class="recipe-meta"><span>⏱ ${r.time}</span><span>🎯 ${r.diff}</span><span>🔥 ${r.cal} kcal</span><span class="stars">${Array.from({length:5},(_,i)=>`<span class="star ${i<Math.round(r.rating)?'filled':''}">★</span>`).join('')} ${r.rating}</span></div>
        ${r.specialNote?`<div style="margin-top:6px;font-size:11px;color:${r.special==='gestante'?'#fda4af':'#f9a8d4'};background:${r.special==='gestante'?'rgba(249,168,212,.07)':'rgba(244,114,182,.07)'};padding:6px 8px;border-radius:6px;line-height:1.5;border-left:2px solid ${r.special==='gestante'?'#fda4af':'#f9a8d4'}">${r.specialNote}</div>`:''}
      </div>
    </div>`).join('')}
  </div>`;
}

function renderRecipeDetail(id) {
  const r = RECIPES.find(r=>r.id===id); if(!r) return '';
  const scoreCol = r.score>=7?'var(--green)':r.score>=4?'var(--orange)':'var(--red)';
  return `
  <div class="screen-header">
    <button class="btn btn-ghost" onclick="REC.openRecipe=null;navigate('recipes')" style="font-size:20px">←</button>

    <div class="card card-glow" style="margin-bottom:16px">

      <div class="macro-row" style="margin-bottom:8px">
        ${[['🔥',r.cal,'kcal'],['💪',r.prot+'g','proteína'],['🌾',r.carb+'g','carbos'],['🧈',r.fat+'g','gordura'],['🌿',r.fiber+'g','fibra']].map(([e,v,l])=>`<div class="macro-card" style="text-align:center"><div style="font-size:16px">${e}</div><div style="font-size:14px;font-weight:700">${v}</div><div style="font-size:9px;color:var(--text3)">${l}</div></div>`).join('')}

    <h3 style="font-family:var(--font-serif);margin-bottom:12px">${t('recipe_detail')}</h3>
    ${r.ingredients.map(ing=>`<div class="ingredient-item"><div class="ingredient-bullet"></div><div style="font-size:13px">${ing}</div></div>`).join('')}
    <h3 style="font-family:var(--font-serif);margin:16px 0 12px">${t('steps')}</h3>
    ${r.steps.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}

function renderHydration() {
  const c = APP.calc||{aguaCopos:8,agua:2000};
  const pct = Math.min(Math.round((APP.water/c.aguaCopos)*100),100);
  const hist = WATER_HISTORY;
  const maxH = Math.max(...hist);
  const tips = ['Beba um copo de água ao acordar para ativar o metabolismo! ☀️','Adicione rodelas de limão ou hortelã para tornar a água mais saborosa 🍋','A cor da urina é um ótimo indicador: amarelo claro = bem hidratado 💛','Coma alimentos ricos em água: pepino, melancia, morango 🍉','Antes do treino, hidrate-se com 500ml para melhor desempenho 💪'];
  const todayTip = tips[new Date().getDate()%tips.length];
  return `
  <div class="screen-header"><div class="screen-title">💧 ${t('hydration')}</div></div>
  <div class="water-hero">
    <div style="position:relative;width:180px;height:180px;margin:0 auto 20px">
      ${svgRing(180,14,pct,'var(--blue)','#1e2530')}
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
        <div class="water-big-num">${APP.water}</div>
        <div style="font-size:12px;color:var(--text3)">de ${c.aguaCopos} copos</div>
        <div style="font-size:11px;color:var(--blue);margin-top:2px">${APP.water*250}ml</div>
        <div style="font-size:11px;color:var(--text3)">${pct}%</div>
      </div>
    </div>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:8px;padding:0 16px;justify-content:center;margin-bottom:16px">
    ${Array.from({length:c.aguaCopos},(_,i)=>`<div onclick="setWater(${i+1})" style="font-size:28px;cursor:pointer;transition:all .2s;opacity:${i<APP.water?1:.25};transform:${i<APP.water?'scale(1.1)':'scale(1)'}">🥤</div>`).join('')}
  </div>

  <div class="water-buttons">
    ${[[200,'💧 200ml'],[350,'💧 350ml'],[500,'💧 500ml'],[1000,'💧 1L']].map(([ml,l])=>`<button class="water-add-btn" onclick="addWater(${ml})">${l}</button>`).join('')}
  </div>
  ${APP.water>0?`<div style="text-align:center;margin-bottom:12px"><button class="btn btn-sm btn-ghost" onclick="APP.water=Math.max(0,APP.water-1);navigate('hydration')" style="color:var(--text3)">↩ Desfazer último</button></div>`:''}

  <div class="water-tip" style="margin-bottom:16px">
    <div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:4px">💡 Dica de hidratação</div>
    <div class="water-tip-text">${todayTip}</div>
  </div>

  <div class="section-title">Últimos 7 dias</div>
  <div style="padding:0 16px;margin-bottom:16px">
    <div class="history-bar-row">
      ${hist.map(h=>`<div class="history-bar" style="height:${Math.round((h/maxH)*100)}%;background:${h>=c.aguaCopos?'var(--blue)':'rgba(56,189,248,.3)'}"></div>`).join('')}
    </div>
    <div class="history-labels">${['S','T','Q','Q','S','S','D'].map(d=>`<div class="history-label">${d}</div>`).join('')}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:8px;text-align:center">Média: ${Math.round(hist.reduce((a,b)=>a+b,0)/hist.length)} copos/dia · Meta: ${c.aguaCopos} copos</div>
  </div>`;
}
function addWater(ml) {
  const cups = Math.round(ml/250);
  APP.water = Math.min(APP.water+cups, (APP.calc?.aguaCopos||8)+4);
  toast(t('water_added',ml),'success'); addXP(5);
  navigate('hydration');
}
function setWater(n) {
  APP.water=n;
  sbGetUser().then(u => { if(u) sbSaveAgua(u.id, APP.water); });
  navigate('hydration');
}

  const elapsed = FAST.active && FAST.startTime ? Math.min((Date.now()-FAST.startTime)/3600000, proto.fast) : 0;
  const pct = proto.fast>0 ? Math.round((elapsed/proto.fast)*100) : 0;

  <div style="padding:0 16px;margin-bottom:16px">
    ${PROTOCOLS.map(p=>`<div class="protocol-card ${FAST.protocol===p.id?'active':''}" onclick="FAST.protocol='${p.id}';navigate('fasting')">
      <div><div class="protocol-name">${p.name} ${p.popular?'<span style="font-size:10px;padding:2px 6px;border-radius:99px;background:rgba(34,197,94,.15);color:var(--green);margin-left:6px">Popular</span>':''}</div><div class="protocol-desc">${p.desc}</div></div>
      ${FAST.protocol===p.id?'<span style="color:var(--purple);font-size:20px">✓</span>':'<span style="color:var(--text3)">›</span>'}
    </div>`).join('')}

  <div class="section-title">O que consumir durante o jejum?</div>
  <div style="padding:0 16px;margin-bottom:16px">
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px">✅ Permitido</div>${['Água','Água com gás','Café preto','Chá sem açúcar','Eletrólitos'].map(i=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">• ${i}</div>`).join('')}</div>
        <div><div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px">❌ Quebra jejum</div>${['Qualquer alimento','Sucos','Refrigerante','Leite / cream','Adoçante calórico'].map(i=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">• ${i}</div>`).join('')}</div>

    </div>
  </div>`;
}

function formatTime(secs) {
  const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=Math.floor(secs%60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function toggleFast() {
  if (FAST.active) {
    FAST.active=false; clearInterval(FAST.interval);
    toast('Jejum encerrado! ✅','success'); addXP(30);
  } else {
    FAST.active=true; FAST.startTime=Date.now();
    FAST.interval=setInterval(()=>navigate('fasting'),1000);
    toast('Jejum iniciado! ⏱️','success');
  }
  navigate('fasting');
}

// ── State ─────────────────────────────
SCAN.mode = SCAN.mode || 'live';  // live | photo | manual
SCAN.quaggaRunning = false;

window.setScanMode = function(mode) {
  // Stop live scanner if switching away
  if (SCAN.mode === 'live' && mode !== 'live') stopLiveScanner();
  SCAN.mode = mode;
  navigate('scanner');
  // Auto-start live scanner
  if (mode === 'live') setTimeout(startLiveScanner, 300);
};

// ── MODO 1: Câmera ao vivo com QuaggaJS ──
window.startLiveScanner = async function() {
  // No mobile browser (não app nativo), câmera ao vivo tem restrições HTTPS
  // Verifica se é HTTPS ou localhost
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    const statusEl = document.getElementById('scan-live-status');
    if (statusEl) statusEl.innerHTML = '⚠️ Câmera ao vivo requer HTTPS. <a href="#" onclick="setScanMode(\'photo\')" style="color:var(--green)">Use o modo Foto</a>';
    return;
  }
  const statusEl = document.getElementById('scan-live-status');
  const viewport = document.getElementById('quagga-viewport');
  if (!viewport) return;

  // Check camera permission
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    stream.getTracks().forEach(t => t.stop()); // Just testing permission
  } catch(e) {
    var isIOS=/iPhone|iPad|iPod/i.test(navigator.userAgent);
    var iosMsg=isIOS?'📱 <b>iOS:</b> Ajustes → Safari → Câmera → Permitir. Depois recarregue.':'📱 Toque no 🔒 na barra de endereço → Câmera → Permitir.';
    if (statusEl) statusEl.innerHTML = '❌ Câmera negada. '+iosMsg+' <a href="#" onclick="setScanMode(\'photo\')" style="color:var(--green)">Ou use Foto</a>';
    return;
  }

  if (typeof Quagga === 'undefined') {
    if (statusEl) statusEl.textContent = '⏳ Carregando leitor de código...';
    // Load QuaggaJS dynamically
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js';
      s.onload = resolve;
      s.onerror = () => {
        if (statusEl) statusEl.innerHTML = '❌ Erro ao carregar leitor. <a href="#" onclick="setScanMode(\'photo\')" style="color:var(--green)">Use foto</a>';
        reject();
      };
      document.head.appendChild(s);
    }).catch(() => null);
    if (typeof Quagga === 'undefined') return;
  }

  if (statusEl) statusEl.textContent = '📷 Câmera ativa — aponte para o código';

  try {
    Quagga.init({
      inputStream: {
        name: 'Live',
        type: 'LiveStream',
        target: viewport,
        constraints: {
          facingMode: 'environment',
          width: { ideal: 1280 },
          height: { ideal: 720 },
        },
      },
      locator: { patchSize: 'medium', halfSample: true },
      numOfWorkers: 2,
      frequency: 10,
      decoder: {
        readers: ['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader','upc_e_reader','i2of5_reader','2of5_reader'],
      },
      locate: true,
    }, function(err) {
      if (err) {
        console.error('QuaggaJS init error:', err);
        if (statusEl) statusEl.textContent = '❌ Erro ao iniciar câmera. Tente o modo Foto.';
        return;
      }
      Quagga.start();
      SCAN.quaggaRunning = true;
      if (statusEl) statusEl.textContent = '🟢 Câmera ativa — aponte para o código de barras';
    });

    // On successful decode
    let lastCode = '', lastTime = 0;
    Quagga.onDetected(function(result) {
      const code = result.codeResult.code;
      const now = Date.now();
      // Debounce: same code within 3s = skip
      if (code === lastCode && now - lastTime < 3000) return;
      lastCode = code;
      lastTime = now;

      // Vibrate on success
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      stopLiveScanner();
      if (!window._scanLock) doScan(code);
    });

    // Draw overlay on detected frames
    Quagga.onProcessed(function(result) {
      const drawingCtx = Quagga.canvas.ctx.overlay;
      const drawingCanvas = Quagga.canvas.dom.overlay;
      if (!drawingCtx || !drawingCanvas) return;
      drawingCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
      if (result && result.boxes) {
        result.boxes.filter(b => b !== result.box).forEach(box => {
          Quagga.ImageDebug.drawPath(box, { x: 0, y: 1 }, drawingCtx, { color: 'rgba(255,255,0,0.5)', lineWidth: 2 });
        });
      }
      if (result && result.box) {
        Quagga.ImageDebug.drawPath(result.box, { x: 0, y: 1 }, drawingCtx, { color: '#22c55e', lineWidth: 3 });
      }
    });

  } catch(e) {
    if (statusEl) statusEl.textContent = '❌ Câmera não disponível. Use o modo Foto.';
  }
};

window.stopLiveScanner = function() {
  // 1. Stop Quagga engine
  if (typeof Quagga !== 'undefined') {
    try { Quagga.stop(); } catch(e) {}
    try { Quagga.offDetected(); } catch(e) {}
    try { Quagga.offProcessed(); } catch(e) {}
  }
  SCAN.quaggaRunning = false;
  // 2. Kill all video tracks (turns off camera light)
  var viewport = document.getElementById('quagga-viewport');
  if (viewport) {
    viewport.querySelectorAll('video').forEach(function(v) {
      try {
        if (v.srcObject) { v.srcObject.getTracks().forEach(function(t){t.stop();}); v.srcObject = null; }
        v.remove();
      } catch(e) {}
    });
    viewport.querySelectorAll('canvas').forEach(function(cv) { cv.remove(); });
    viewport.innerHTML = '';
  }
  // 3. Global cleanup — any orphan video streams
  document.querySelectorAll('video').forEach(function(v) {
    try { if (v.srcObject) { v.srcObject.getTracks().forEach(function(t){t.stop();}); v.srcObject = null; } } catch(e) {}
  });
  var s = document.getElementById('scan-live-status');
  if (s) s.textContent = '📷 Câmera desligada';
};

// ── MODO 2: Leitura de foto com ZXing ─────
window.scanFromPhoto = async function(input) {
  const file = input?.files?.[0];
  if (!file) return;

  const statusEl = document.getElementById('scan-photo-status');
  if (statusEl) statusEl.innerHTML = '⏳ Lendo código da foto...';

  // Load ZXing if not available
  if (typeof ZXing === 'undefined') {
    try {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js';
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    } catch(e) {
      // ZXing failed to load — use canvas fallback
      if (statusEl) statusEl.innerHTML = '⚠️ Usando análise alternativa...';
    }
  }

  const reader = new FileReader();
  reader.onload = async (ev) => {
    const imgSrc = ev.target.result;

    // Try ZXing decode
    if (typeof ZXing !== 'undefined') {
      try {
        const hints = new Map();
        const formats = [
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8,
          ZXing.BarcodeFormat.CODE_128,
          ZXing.BarcodeFormat.CODE_39,
          ZXing.BarcodeFormat.UPC_A,
          ZXing.BarcodeFormat.UPC_E,
        ];
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

        const codeReader = new ZXing.MultiFormatReader();
        codeReader.setHints(hints);

        // Create image element
        const img = new Image();
        img.onload = () => {
          try {
            // Create canvas and draw image
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const luminanceSource = new ZXing.RGBLuminanceSource(imageData.data, canvas.width, canvas.height);
            const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
            const result = codeReader.decode(binaryBitmap);
            if (result && result.getText()) {
              const code = result.getText();
              if (statusEl) statusEl.innerHTML = `✅ Código detectado: <strong>${code}</strong>`;
              if (navigator.vibrate) navigator.vibrate(200);
              setTimeout(() => doScan(code), 500);
            } else {
              fallbackScan(statusEl);
            }
          } catch(err) {
            fallbackScan(statusEl);
          }
        };
        img.onerror = () => fallbackScan(statusEl);
        img.src = imgSrc;
        return;
      } catch(e) {
        fallbackScan(statusEl);
        return;
      }
    }

    // Fallback: try to read digits from image using canvas
    fallbackScan(statusEl);
  };
  reader.readAsDataURL(file);
  input.value = '';
};

function fallbackScan(statusEl) {
  // Smart fallback: try to find code from filename or use demo
  if (statusEl) statusEl.innerHTML = '⚠️ Não foi possível ler o código. Tente apontar melhor a câmera ou <a href="#" onclick="setScanMode(\'manual\')" style="color:var(--green)">digite manualmente</a>.';
  toast('Dica: mantenha o código de barras centralizado e bem iluminado 💡', 'info', 4000);
}

window.handleScanPhoto = window.scanFromPhoto;


function doScan(code) {
  if (!code?.trim()) { toast('Digite ou selecione um código', 'error'); return; }
  if (window._scanLock) return; // prevent re-entry from scanner re-render
  window._scanLock = true;
  setTimeout(function() { window._scanLock = false; }, 3000);
  const clean = code.trim().replace(/\s/g, '');

  // Auto-detect country from barcode prefix
  let detectedCountry = '🌍';
  if (clean.startsWith('789')) detectedCountry = '🇧🇷';          // Brasil
  else if (clean.startsWith('46'))  detectedCountry = '🇷🇺';     // Rússia
  else if (clean.length === 12)     detectedCountry = '🇺🇸';     // UPC-A (EUA)
  else if (clean.startsWith('00') || clean.startsWith('01') ||
           clean.startsWith('03') || clean.startsWith('04')) detectedCountry = '🇺🇸'; // EAN-13 EUA
  else if (clean.startsWith('50'))  detectedCountry = '🇬🇧';     // UK
  else if (clean.startsWith('40') || clean.startsWith('41') ||
           clean.startsWith('42') || clean.startsWith('43')) detectedCountry = '🇩🇪'; // Alemanha
  else if (clean.startsWith('30') || clean.startsWith('37')) detectedCountry = '🇫🇷'; // França
  else if (clean.startsWith('80') || clean.startsWith('83')) detectedCountry = '🇮🇹'; // Itália
  else if (clean.startsWith('84'))  detectedCountry = '🇪🇸';     // Espanha
  else if (clean.startsWith('860')) detectedCountry = '🇷🇸';     // Sérvia
  else if (clean.startsWith('728')) detectedCountry = '🇮🇱';     // Israel
  else if (clean.startsWith('690') || clean.startsWith('691') ||
           clean.startsWith('692')) detectedCountry = '🇨🇳';     // China

  const found = PRODUCTS.find(p => p.code === clean);
  const p = found || {
    ...PRODUCTS[Math.floor(Math.random() * PRODUCTS.length)],
    code: clean,
    name: 'Produto ' + clean,
    country: detectedCountry,
  };
  if (!found) p.country = detectedCountry;

  SCAN.result = p;
  SCAN.barcode = clean;
  if (!SCAN.history.find(h => h.code === p.code)) SCAN.history.unshift(p);
  addXP(5);
  toast('✅ Produto identificado! +5 XP', 'success', 2000);
  navigate('scanner');
}

═══════════════════════════════════════ */
function renderShopping() {
  const allItems = SHOP_ITEMS.flatMap(cat=>cat.items.map(i=>({...i,cat:cat.cat})));
  const done = allItems.filter(i=>i.done).length;
  const total = allItems.length;
  const totalPrice = allItems.filter(i=>!i.done).reduce((s,i)=>{const p=parseFloat(i.price?.replace('R$ ','').replace(',','.'))||0;return s+p;},0);
  return `
  <div class="screen-header"><div class="screen-title">🛒 ${t('shopping')}</div></div>
  <div class="shop-header-card">
    <div><div style="font-size:13px;font-weight:700">${done}/${total} itens comprados</div><div style="font-size:11px;color:var(--text2);margin-top:2px">Restante: R$ ${totalPrice.toFixed(2).replace('.',',')}</div></div>
    <button class="btn btn-sm btn-outline" onclick="navigate('shopping')">↻ Atualizar</button>
  </div>

  <!-- AI suggestion -->
  <div style="padding:0 16px;margin-bottom:12px">
    <div class="card card-blue">
      <div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:4px">🤖 Modo "Com o que tem em casa"</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Diga o que você tem e recebo sugestões de receitas!</div>
      <button class="btn btn-outline btn-full" onclick="openModal('Modo Criativo',\`<textarea class='input' rows='3' placeholder='Ex: frango, arroz, brócolis, ovos...' style='resize:none;width:100%;margin-bottom:12px'></textarea><button class='btn btn-primary btn-full' onclick='toast(\\\"Receitas sugeridas pela IA! 🍴\\\",\\\"success\\\");closeModal()'>Sugerir receitas</button>\`)" style="font-size:12px;padding:8px">🔍 Sugerir receitas com o que tenho</button>
    </div>
  </div>

  <!-- Items by category -->
  ${SHOP_ITEMS.map((cat,ci)=>`
  <div class="category-header"><span>${cat.cat}</span></div>
  ${cat.items.map((item,ii)=>`<div class="shop-item" onclick="SHOP_ITEMS[${ci}].items[${ii}].done=!SHOP_ITEMS[${ci}].items[${ii}].done;navigate('shopping')">
    <div class="shop-check ${item.done?'checked':''}">${item.done?'✓':''}</div>
    <div class="shop-name ${item.done?'checked':''}">${item.n}</div>
    <div class="shop-qty">${item.q}</div>
    <div class="shop-price">${item.price}</div>
  </div>`).join('')}`).join('')}

  <!-- Add item -->
  <div style="padding:16px;border-top:1px solid var(--border);margin-top:8px">
    <button class="btn btn-outline btn-full" onclick="openModal('Adicionar item',\`<div class='input-wrap'><label class='input-label'>Nome do item</label><input id='new-item-name' class='input' placeholder='Ex: Azeite de oliva'></div><div class='input-wrap'><label class='input-label'>Quantidade</label><input id='new-item-qty' class='input' placeholder='Ex: 500ml'></div><button class='btn btn-primary btn-full' onclick='addShopItem()'>Adicionar</button>\`)">+ Adicionar item</button>
  </div>`;
}

window.addShopItem = function() {
  const name=document.getElementById('new-item-name')?.value.trim(), qty=document.getElementById('new-item-qty')?.value.trim();
  if(!name){toast('Digite o nome do item','error');return;}
  SHOP_ITEMS[5] = SHOP_ITEMS[5]||{cat:'🧴 Outros',items:[]};
  SHOP_ITEMS[5].items.push({n:name,q:qty||'1 un.',price:'—',done:false});
  toast('Item adicionado!','success'); closeModal(); navigate('shopping');
};

window.saveEditProfile = function() {
  const name = document.getElementById('ep-name')?.value.trim();
  const weight = parseFloat(document.getElementById('ep-weight')?.value);
  const height = parseFloat(document.getElementById('ep-height')?.value);
  const age = parseInt(document.getElementById('ep-age')?.value);
  const gender = document.getElementById('ep-gender')?.value;
  const goal = document.getElementById('ep-goal')?.value;
  const activity = document.getElementById('ep-activity')?.value;
  if(!name){toast('Nome obrigatório','error');return;}
  if(!weight||weight<20||weight>300){toast('Peso inválido','error');return;}
  if(!height||height<100||height>250){toast('Altura inválida','error');return;}
  APP.profile = {...(APP.profile||{}), name, weight, height, age:age||30, gender:gender||'m', goal:goal||'lose', activity:activity||'mod'};
  APP.user = {...(APP.user||{}), name};
  APP.calc = calcProfile(APP.profile);
  save('v_profile', APP.profile); save('v_user', APP.user);
  closeModal(); toast('✅ Perfil atualizado!', 'success'); navigate('settings');
};

function genOTP() {
  const code = String(Math.floor(100000 + Math.random() * 900000));
  const expires = Date.now() + 5 * 60 * 1000; // 5 min
  APP.telegram = APP.telegram || {};
  APP.telegram.otpCode = code;
  APP.telegram.otpExpires = expires;
  saveTelegram();
  return code;
}

      </div>

window.otpInput = function(i, el) {
  const v = el.value.replace(/\D/,'');
  el.value = v;
  el.classList.toggle('filled', !!v);
  if(v && i<5) { document.getElementById(`otp-in-${i+1}`)?.focus(); }
};

window.otpKeydown = function(i, e) {
  if(e.key==='Backspace' && !e.target.value && i>0) { document.getElementById(`otp-in-${i-1}`)?.focus(); }
};

let _otpInterval = null;
function startOTPTimer(secs) {
  clearInterval(_otpInterval);
  _otpInterval = setInterval(() => {
    const el = document.getElementById('otp-timer');
    if(!el){ clearInterval(_otpInterval); return; }
    secs--;
    if(secs<=0){ clearInterval(_otpInterval); el.textContent='Expirado'; el.style.color='var(--red)'; return; }
    const m = Math.floor(secs/60), s = secs%60;
    el.textContent = `${m}:${String(s).padStart(2,'0')}`;
    if(secs<=60) el.style.color='var(--orange)';
  }, 1000);
}

window.verifyOTP = function(expected) {
  const entered = [0,1,2,3,4,5].map(i=>document.getElementById(`otp-in-${i}`)?.value||'').join('');
  if(entered.length !== 6 || !/^\d{6}$/.test(entered)) { toast('Digite os 6 dígitos do código','error'); return; }
  const btn = document.getElementById('verify-otp-btn');
  if(btn){ btn.classList.add('btn-loading'); btn.disabled=true; }
  setTimeout(()=>{
    // In demo: accept any 6-digit code, or exact match
    const valid = entered === expected || /^\d{6}$/.test(entered);
    clearInterval(_otpInterval);
    if(valid){
      const username = 'vitalia_user';
      APP.telegram = {
        connected: true,
        username,
        chatId: Math.floor(100000000 + Math.random()*900000000),
        linkedAt: new Date().toISOString(),
        notifs: {meals:true, water:true, streak:true, achievements:true, weekly:true, motivational:true},
        channelSubscribed: false,
        groupJoined: false,
      };
      saveTelegram();
      closeModal();
      confetti();
      toast('✅ Telegram vinculado! Bem-vindo ao @VitalIABot', 'success', 4000);
      navigate('telegram');
    } else {
      if(btn){ btn.classList.remove('btn-loading'); btn.disabled=false; }
      toast('Código incorreto. Tente novamente.','error');
    }
  }, 1500);
};

window.shareToNetwork = function(network) {
  const text = buildShareText();
  const url = 'https://elicarlosiurd-sudo.github.io/aplicativo-vitalia/VitalIA.html';
  const encoded = encodeURIComponent(text);
  const encodedUrl = encodeURIComponent(url);
  
  const links = {
    whatsapp: `https://wa.me/?text=${encoded}`,
    twitter: `https://twitter.com/intent/tweet?text=${encoded}`,
    telegram: `https://t.me/share/url?url=${encodedUrl}&text=${encoded}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`,
    instagram: null, // Instagram não suporta deep link de texto
    tiktok: null,
  };
  
  if(links[network]) {
    window.open(links[network], '_blank', 'noopener');
    toast('Abrindo para compartilhar! 🎉','success');
  } else if(network === 'instagram' || network === 'tiktok') {
    // Copy to clipboard for Instagram/TikTok
    navigator.clipboard?.writeText(text).then(()=>{
      toast(`Texto copiado! Cole na bio do ${network==='instagram'?'Instagram':'TikTok'} 📋`,'success',4000);
    }).catch(()=>{
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast('Texto copiado para área de transferência! 📋','success',4000);
    });
  } else {
    // Native share API
    if(navigator.share) {
      navigator.share({title:'VitalIA', text, url})
        .then(()=>toast('Compartilhado!','success'))
        .catch(()=>{});
    } else {
      navigator.clipboard?.writeText(text+' '+url);
      toast('Link copiado! 📋','success');
    }
  }
};

window.addEventListener('DOMContentLoaded', async () => {
  applyTheme();
  if(!LANG[APP.lang]) APP.lang='pt';

  // Animate splash
  setTimeout(async () => {
    document.getElementById('splash').style.animation='none';
    document.getElementById('splash').style.opacity='0';
    document.getElementById('splash').style.transition='opacity .4s';

    setTimeout(async () => {
      document.getElementById('splash').style.display='none';

      // Check session — só persiste se "lembrar de mim" foi marcado
      const rememberMe = localStorage.getItem('v_remember') === '1';
      let session = null;
      try {
        const _sr = await sb.auth.getSession();
        session = _sr?.data?.session || null;
      } catch(e) { session = null; }

      var hasTabActive=sessionStorage.getItem('v_tab_active');
      if (session && session.user && (rememberMe||hasTabActive)) {
        const user = session.user;
        APP.user = { email: user.email, name: user.user_metadata?.nome || user.email.split('@')[0], id: user.id };
        APP.session = session.access_token;
        save('v_user', APP.user); save('v_session', APP.session);

        // Load data from Supabase
        if (!APP.profile) APP.profile = { name: APP.user.name, weight:78, height:175, age:30, gender:'m', goal:'lose', activity:'mod', restrictions:[] };
        APP.calc = calcProfile(APP.profile);
        APP.meals=[];

        // Sync from Supabase in background
        syncFromSupabase(user.id).then(() => {
          if(APP.tab) navigate(APP.tab);
        });

        startApp();
        scheduleNotifications();
        scheduleTelegramNotifs();

      } else if (APP.session && APP.user) {
        // Fallback to localStorage session
        if(!APP.profile) APP.profile={name:'Usuário Demo',weight:78,height:175,age:30,gender:'m',goal:'lose',activity:'mod'};
        APP.calc=calcProfile(APP.profile);
        APP.water=APP.water||0; APP.meals=APP.meals?.length?APP.meals:[];
        if(!APP.weightHistory?.length) APP.weightHistory=WEIGHT_HISTORY.map((p,i)=>({date:new Date(Date.now()-i*86400000).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}),peso:p})).reverse();
        startApp(); scheduleNotifications(); scheduleTelegramNotifs();
      } else {
        startAuth();
      }
    }, 400);
  }, 2200);

  // Listen for auth changes
  try { sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT') {
      APP.session = null; APP.user = null;
    }
  }); } catch(e) { console.warn('Auth listener error:', e); }
});

// ── coachSpeakResponse — TTS da resposta ────────────────────────
function coachSpeakResponse(text) {
  if (!text || !window.speechSynthesis) return;
  // Remove emojis e markdown para TTS mais limpo
  var clean = text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u2600-\u27BF]/g, '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/#{1,6}\s/g, '')
    .replace(/\n{2,}/g, '. ')
    .replace(/\n/g, ', ')
    .trim();
  if (!clean || clean.length < 5) return;
  window.speechSynthesis.cancel();
  var utt = new SpeechSynthesisUtterance(clean);
  utt.lang = 'pt-BR';
  utt.rate = 1.0;
  utt.pitch = 1.0;
  // Escolhe voz pt-BR se disponível
  var voices = window.speechSynthesis.getVoices();
  var ptVoice = voices.find(function(v){ return v.lang && v.lang.startsWith('pt'); });
  if (ptVoice) utt.voice = ptVoice;
  window.speechSynthesis.speak(utt);
}

// ── Gravação real com MediaRecorder ────────────────────────────
function toggleCoachRec() { if(_coachRec.recording) stopCoachRecording(); else startCoachRecording(); }

async function startCoachRecording() {
  if (_coachRec.recording) return;
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    _coachRec.stream = stream;
    _coachRec.chunks = [];
    var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
    var recorder = new MediaRecorder(stream, { mimeType:mimeType });
    _coachRec.recorder = recorder;
    recorder.ondataavailable = function(e){ if(e.data&&e.data.size>0) _coachRec.chunks.push(e.data); };
    recorder.onstop = function(){
      var blob = new Blob(_coachRec.chunks, { type:mimeType });
      _coachRec.chunks = [];
      if (_coachRec.stream){ _coachRec.stream.getTracks().forEach(function(t){t.stop();}); _coachRec.stream=null; }
      sendAudioToBackend(blob);
    };
    recorder.start(200);
    _coachRec.recording = true;
    var micBtn = document.getElementById('coach-mic-btn');
    if (micBtn){ micBtn.classList.add('recording'); micBtn.textContent='⏹'; }
    var recInd = document.getElementById('rec-indicator');
    if (recInd) recInd.classList.add('active');
    _coachRec.timer = setTimeout(function(){ if(_coachRec.recording) stopCoachRecording(); }, 60000);
  } catch(e) {
    if (typeof toast==='function') toast('❌ Microfone: '+(e.message||'sem permissão'),'error',3000);
  }
}

function stopCoachRecording() {
  if (!_coachRec.recording) return;
  _coachRec.recording = false;
  if (_coachRec.timer){ clearTimeout(_coachRec.timer); _coachRec.timer=null; }
  if (_coachRec.recorder && _coachRec.recorder.state!=='inactive') _coachRec.recorder.stop();
  var micBtn = document.getElementById('coach-mic-btn');
  if (micBtn){ micBtn.classList.remove('recording'); micBtn.textContent='🎤'; }
  var recInd = document.getElementById('rec-indicator');
  if (recInd) recInd.classList.remove('active');
}

// ── sendAudioToBackend — Groq Whisper + resposta em áudio ───────
async function sendAudioToBackend(blob) {
  // Show audio player in chat
  var localUrl = URL.createObjectURL(blob);
  var time = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  var msgs = document.getElementById('coach-msgs');
  if (msgs) {
    var div = document.createElement('div');
    div.className = 'msg-wrap user';
    div.innerHTML = '<div class="msg-bubble"><div style="font-size:11px;opacity:.7;margin-bottom:4px">🎤 Áudio gravado</div><audio controls src="'+localUrl+'" style="max-width:200px;height:36px;border-radius:8px"></audio></div><div class="msg-time">'+time+'</div>';
    msgs.appendChild(div);
    scrollCoachToBottom();
  }

  appendBotMsg('🔄 Transcrevendo áudio...');
  var transcribedText = null;
  var lastError = '';

  // Try Whisper with each Groq key, trying both webm and mp4 MIME
  for (var ki = 0; ki < _GROQ_KEYS.length && !transcribedText; ki++) {
    var key = _GROQ_KEYS[(_coachKeyIdx + ki) % _GROQ_KEYS.length];
    
    // Try original blob first, then re-package
    var blobsToTry = [blob];
    // If original is webm, also try with mp4 extension (some Whisper versions prefer)
    if (blob.type.includes('webm') || blob.type.includes('ogg')) {
      blobsToTry.push(new Blob([blob], {type: 'audio/mp4'}));
    }
    
    for (var bi = 0; bi < blobsToTry.length && !transcribedText; bi++) {
      var b = blobsToTry[bi];
      var ext = b.type.includes('mp4') ? 'mp4' : b.type.includes('ogg') ? 'ogg' : 'webm';
      try {
        var formData = new FormData();
        formData.append('file', b, 'audio.' + ext);
        formData.append('model', 'whisper-large-v3-turbo');
        formData.append('language', 'pt');
        formData.append('response_format', 'json');
        var resp = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + key },
          body: formData
        });
        if (resp.status === 429) { lastError = 'rate_limit'; continue; }
        if (!resp.ok) {
          var errBody = await resp.text().catch(function(){return '';});
          lastError = 'status_' + resp.status + ': ' + errBody.substring(0,80);
          console.warn('Whisper error:', lastError);
          continue;
        }
        var data = await resp.json();
        var t = (data.text || '').trim();
        if (t && t.length > 1) { transcribedText = t; break; }
      } catch(e) {
        lastError = e.message;
        console.warn('Whisper attempt failed:', e.message);
      }
    }
  }

  // Remove "Transcrevendo..." bubble
  var aiMsgs = document.querySelectorAll('.msg-wrap.ai');
  var last = aiMsgs[aiMsgs.length-1];
  if (last && last.textContent.includes('Transcrevendo')) { last.remove(); APP.coachMsgs.pop(); }

  if (transcribedText && transcribedText.length > 1) {
    sendCoachMsg(transcribedText);
  } else {
    console.warn('Whisper all attempts failed. Last error:', lastError);
    // Fallback: ask user to type, but show what went wrong in console
    appendBotMsg('🎤 Áudio recebido! Não foi possível transcrever automaticamente ('+( lastError.includes('rate_limit') ? 'limite da API' : 'formato de áudio')+'). Por favor, **digita sua pergunta** abaixo — responderei imediatamente! 💬');
  }
}

// ── coachGetAIResp ───────────────────────────────────────────────
async function coachGetAIResp(msg) {
  var GROQ_MODELS = [
    'llama-3.3-70b-versatile',
    'llama3-70b-8192',
    'llama-3.1-70b-versatile',
    'llama3-8b-8192',
    'mixtral-8x7b-32768',
    'gemma2-9b-it'
  ];

  var systemPrompt = buildSystemPrompt();

  // Tenta cada key × modelo
  for (var attempt = 0; attempt < _GROQ_KEYS.length * 2; attempt++) {
    var key   = _GROQ_KEYS[_coachKeyIdx % _GROQ_KEYS.length];
    var model = GROQ_MODELS[attempt % GROQ_MODELS.length];
    _coachKeyIdx++;
    try {
      var resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+key },
        body: JSON.stringify({
          model: model,
          messages: [
            { role:'system', content: systemPrompt },
            { role:'user',   content: msg }
          ],
          max_tokens: 700,
          temperature: 0.65
        })
      });
      if (resp.status===429 || resp.status===404) continue;
      if (!resp.ok) { console.warn('Groq '+resp.status); continue; }
      var data = await resp.json();
      var text = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
      if (text && text.trim()) return text.trim();
    } catch(e) { /* continua */ }
  }

  // Fallback Gemini
  try {
    var gr = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+_GEMINI_KEY, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({
        system_instruction: { parts:[{ text: systemPrompt }] },
        contents: [{ parts:[{ text: msg }] }],
        generationConfig: { maxOutputTokens:600, temperature:0.65 }
      })
    });
    if (gr.ok) {
      var gd = await gr.json();
      var gt = gd.candidates&&gd.candidates[0]&&gd.candidates[0].content&&gd.candidates[0].content.parts&&gd.candidates[0].content.parts[0]&&gd.candidates[0].content.parts[0].text;
      if (gt&&gt.trim()) return gt.trim();
    }
  } catch(e) {}

  return coachLocalFallback(msg);
}

// ── coachLocalFallback — base de conhecimento rica ───────────────
function coachLocalFallback(msg) {
  var m = msg.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  if (m.match(/emagrec|perder.*kilo|kilo.*perder|deficit|queimar.*gordu|gordu.*queimar|barriga|secar|cutting/))

// ── initFireflies — Vagalumes verdes animados ───────────────────
function initFireflies() {
  var canvas = document.getElementById('fireflies-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width  = canvas.offsetWidth  || window.innerWidth;
  var H = canvas.height = canvas.offsetHeight || window.innerHeight;

  var flies = Array.from({length: 28}, function() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: 1.2 + Math.random() * 1.8,
      dx: (Math.random() - .5) * .45,
      dy: (Math.random() - .5) * .45,
      alpha: Math.random(),
      dAlpha: .008 + Math.random() * .012,
      pulse: Math.random() * Math.PI * 2
    };
  });

  var raf = null;
  function draw() {
    if (!document.getElementById('fireflies-canvas')) {
      cancelAnimationFrame(raf);
      return;
    }
    ctx.clearRect(0, 0, W, H);
    var now = Date.now() / 1000;
    flies.forEach(function(f) {
      f.pulse += .025;
      f.x += f.dx;
      f.y += f.dy;
      if (f.x < 0) f.x = W;
      if (f.x > W) f.x = 0;
      if (f.y < 0) f.y = H;
      if (f.y > H) f.y = 0;
      var alpha = (.35 + .65 * Math.abs(Math.sin(f.pulse)));
      var glow = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 5);
      glow.addColorStop(0, 'rgba(34,197,94,' + alpha + ')');
      glow.addColorStop(.4, 'rgba(34,197,94,' + (alpha * .3) + ')');
      glow.addColorStop(1, 'rgba(34,197,94,0)');
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r * 5, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(100,255,150,' + alpha + ')';
      ctx.fill();
    });
    raf = requestAnimationFrame(draw);
  }

  // Resize
  var resizeObs = new ResizeObserver(function() {
    W = canvas.width  = canvas.offsetWidth  || window.innerWidth;
    H = canvas.height = canvas.offsetHeight || window.innerHeight;
  });
  resizeObs.observe(canvas);

  cancelAnimationFrame(raf);
  draw();
}
